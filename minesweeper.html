<script src="theme.js"></script>
<script>
// ===========================
// CONFIG
// ===========================
const DIFFS = {
  beginner:     { rows: 9,  cols: 9,  mines: 10, label: 'Beginner' },
  intermediate: { rows: 16, cols: 16, mines: 40, label: 'Intermediate' },
  expert:       { rows: 16, cols: 30, mines: 99, label: 'Expert' },
};

// ===========================
// STATE
// ===========================
let cfg, grid, revealed, flagged, mineSet;
let gameState = 'idle'; // idle | playing | won | lost
let firstClick = true;
let timer, stats;
let currentDiff = 'beginner';
let longPressTimer = null;
let longPressTriggered = false;

// ===========================
// INIT
// ===========================
function init(diff = currentDiff) {
  currentDiff = diff;
  cfg = DIFFS[diff];
  if (timer) timer.stop();
  timer = new GameTimer('timer');
  timer.reset();
  stats = new GameStatsManager('minesweeper_' + diff);

  grid = [];
  revealed = [];
  flagged = [];
  mineSet = new Set();
  gameState = 'idle';
  firstClick = true;

  document.getElementById('mineCount').textContent = cfg.mines;
  document.getElementById('faceBtn').textContent = '&#x1f600;';
  document.getElementById('faceBtn').innerHTML = '&#x1f600;';

  // Build empty grid
  for (let r = 0; r < cfg.rows; r++) {
    grid.push(new Array(cfg.cols).fill(0));
    revealed.push(new Array(cfg.cols).fill(false));
    flagged.push(new Array(cfg.cols).fill(false));
  }

  renderBoard();
}

// ===========================
// MINE PLACEMENT (after first click)
// ===========================
function placeMines(safeR, safeC) {
  const safe = new Set();
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      const nr = safeR + dr, nc = safeC + dc;
      if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols)
        safe.add(nr * cfg.cols + nc);
    }

  while (mineSet.size < cfg.mines) {
    const idx = Math.floor(Math.random() * cfg.rows * cfg.cols);
    if (!safe.has(idx)) mineSet.add(idx);
  }

  // Calculate numbers
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      if (mineSet.has(r * cfg.cols + c)) { grid[r][c] = -1; continue; }
      let count = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols)
            if (mineSet.has(nr * cfg.cols + nc)) count++;
        }
      grid[r][c] = count;
    }
  }
}

// ===========================
// REVEAL LOGIC
// ===========================
function reveal(r, c) {
  if (r < 0 || r >= cfg.rows || c < 0 || c >= cfg.cols) return;
  if (revealed[r][c] || flagged[r][c]) return;

  revealed[r][c] = true;

  if (grid[r][c] === 0) {
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++)
        reveal(r + dr, c + dc);
  }
}

function handleClick(r, c) {
  if (gameState === 'won' || gameState === 'lost') return;
  if (flagged[r][c]) return;

  if (firstClick) {
    firstClick = false;
    gameState = 'playing';
    placeMines(r, c);
    timer.start();
    stats.addPlay();
  }

  if (revealed[r][c]) {
    // Chord: if flagged neighbors == cell number, reveal unflagged neighbors
    const num = grid[r][c];
    if (num > 0) {
      let flagCount = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols)
            if (flagged[nr][nc]) flagCount++;
        }
      if (flagCount === num) {
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols)
              if (!flagged[nr][nc] && !revealed[nr][nc]) {
                if (grid[nr][nc] === -1) { triggerLose(nr, nc); return; }
                reveal(nr, nc);
              }
          }
        checkWin();
        renderBoard();
      }
    }
    return;
  }

  if (grid[r][c] === -1) {
    triggerLose(r, c);
    return;
  }

  reveal(r, c);
  checkWin();
  renderBoard();
}

function handleRightClick(e, r, c) {
  e.preventDefault();
  if (gameState === 'won' || gameState === 'lost') return;
  if (revealed[r][c]) return;
  if (gameState === 'idle') return;

  flagged[r][c] = !flagged[r][c];

  // Update mine counter
  let flagCount = 0;
  for (let r2 = 0; r2 < cfg.rows; r2++)
    for (let c2 = 0; c2 < cfg.cols; c2++)
      if (flagged[r2][c2]) flagCount++;
  document.getElementById('mineCount').textContent = cfg.mines - flagCount;

  renderBoard();
}

// ===========================
// WIN / LOSE
// ===========================
function checkWin() {
  let unrevealedSafe = 0;
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++)
      if (!revealed[r][c] && grid[r][c] !== -1) unrevealedSafe++;

  if (unrevealedSafe === 0) {
    gameState = 'won';
    timer.stop();
    stats.addWin();
    document.getElementById('faceBtn').innerHTML = '&#x1f60e;';
    const isNewBest = stats.setBestTime(currentDiff, timer.time);
    setTimeout(() => showWinModal(isNewBest), 300);
    Confetti.launch();
  }
}

function triggerLose(explodeR, explodeC) {
  gameState = 'lost';
  timer.stop();
  stats.resetStreak();
  document.getElementById('faceBtn').innerHTML = '&#x1f635;';

  // Reveal all mines
  for (let r = 0; r < cfg.rows; r++)
    for (let c = 0; c < cfg.cols; c++)
      if (mineSet.has(r * cfg.cols + c) && !flagged[r][c])
        revealed[r][c] = true;

  renderBoard(explodeR, explodeC);
  setTimeout(() => showLoseModal(), 600);
}

// ===========================
// MODALS
// ===========================
function showWinModal(isNewBest) {
  document.getElementById('winDiff').textContent = DIFFS[currentDiff].label;
  document.getElementById('winTime').textContent = timer.formatted;
  const best = stats.getBestTime(currentDiff);
  document.getElementById('bestBadge').innerHTML = isNewBest
    ? '<div class="best-badge">&#x1f3c6; New Best!</div>'
    : best !== null ? `<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Best: ${new GameTimer().format(best)}</div>` : '';

  document.getElementById('winStats').innerHTML = `
    <div class="stats-card"><div class="s-label">Played</div><div class="s-value">${stats.played}</div></div>
    <div class="stats-card"><div class="s-label">Won</div><div class="s-value">${stats.won}</div></div>
    <div class="stats-card"><div class="s-label">Win %</div><div class="s-value">${stats.winRate}%</div></div>
    <div class="stats-card"><div class="s-label">Streak</div><div class="s-value">${stats.streak}</div></div>
  `;
  Modal.show('winModal');
}

function showLoseModal() {
  document.getElementById('loseStats').innerHTML = `
    <div class="stats-card"><div class="s-label">Played</div><div class="s-value">${stats.played}</div></div>
    <div class="stats-card"><div class="s-label">Won</div><div class="s-value">${stats.won}</div></div>
    <div class="stats-card"><div class="s-label">Win %</div><div class="s-value">${stats.winRate}%</div></div>
    <div class="stats-card"><div class="s-label">Streak</div><div class="s-value">${stats.streak}</div></div>
  `;
  Modal.show('loseModal');
}

// ===========================
// RENDER
// ===========================
function renderBoard(explodeR = -1, explodeC = -1) {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${cfg.cols}, 32px)`;
  board.innerHTML = '';

  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';

      if (revealed[r][c]) {
        if (grid[r][c] === -1) {
          if (r === explodeR && c === explodeC) {
            cell.classList.add('exploded');
            cell.textContent = '&#x1f4a5;';
            cell.innerHTML = '&#x1f4a5;';
          } else {
            cell.classList.add('mine-revealed');
            cell.innerHTML = '&#x1f4a3;';
          }
        } else {
          cell.classList.add('revealed');
          if (grid[r][c] > 0) {
            cell.textContent = grid[r][c];
            cell.classList.add('n' + grid[r][c]);
          }
        }
      } else if (flagged[r][c]) {
        cell.classList.add('flagged');
        cell.innerHTML = '&#x1f6a9;';
      }

      cell.addEventListener('click', (e) => {
        if (longPressTriggered) { longPressTriggered = false; return; }
        handleClick(r, c);
      });
      cell.addEventListener('contextmenu', e => handleRightClick(e, r, c));

      // Long-press to flag on mobile
      cell.addEventListener('touchstart', (e) => {
        longPressTriggered = false;
        longPressTimer = setTimeout(() => {
          longPressTriggered = true;
          handleRightClick(e, r, c);
        }, 400);
      }, { passive: true });
      cell.addEventListener('touchend', () => {
        clearTimeout(longPressTimer);
      });
      cell.addEventListener('touchmove', () => {
        clearTimeout(longPressTimer);
      });

      board.appendChild(cell);
    }
  }
}

// ===========================
// DIFFICULTY BUTTONS
// ===========================
document.querySelectorAll('.pill-btn[data-diff]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill-btn[data-diff]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    grid = []; revealed = []; flagged = [];
    init(btn.dataset.diff);
  });
});

// ===========================
// FACE / RESTART BUTTON
// ===========================
document.getElementById('faceBtn').addEventListener('click', () => {
  grid = []; revealed = []; flagged = [];
  init(currentDiff);
});

// ===========================
// PLAY AGAIN BUTTONS
// ===========================
document.getElementById('winPlayAgain').addEventListener('click', () => {
  Modal.hide('winModal');
  grid = []; revealed = []; flagged = [];
  init(currentDiff);
});
document.getElementById('losePlayAgain').addEventListener('click', () => {
  Modal.hide('loseModal');
  grid = []; revealed = []; flagged = [];
  init(currentDiff);
});

// ===========================
// START
// ===========================
GameTheme.init();
Modal.bindOverlayClose();
init();
</script>
