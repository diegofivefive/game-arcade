    justify-content: center;

  .swap-btn:hover { background: var(--accent2); }
  .swap-btn.spinning svg { transform: rotate(180deg); }
  .swap-btn svg { transition: transform 0.3s; }

  /* Rate info */

    width: 100%;
    text-align: center;
    transition: opacity 0.3s;
  }

  .rate-line {

  .updated-line {
    font-size: 12px;
    color: var(--text-dim);
    opacity: 0.7;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;

  .status-dot.fresh { background: var(--accent3, #00e6b8); }

  /* Error / status messages */

  /* Quick picks */
  .quick-section { width: 100%; }
  .quick-label {

<script src="theme.js"></script>
<script>
GameTheme.init();

/* ── Currency data ── */
const CURRENCIES = {
  AUD: 'Australian Dollar', BGN: 'Bulgarian Lev', BRL: 'Brazilian Real',
  CAD: 'Canadian Dollar', CHF: 'Swiss Franc', CNY: 'Chinese Yuan',
  CZK: 'Czech Koruna', DKK: 'Danish Krone', EUR: 'Euro',
  GBP: 'British Pound', HKD: 'Hong Kong Dollar', HUF: 'Hungarian Forint',
  IDR: 'Indonesian Rupiah', ILS: 'Israeli Shekel', INR: 'Indian Rupee',
  ISK: 'Icelandic Krona', JPY: 'Japanese Yen', KRW: 'South Korean Won',
  MXN: 'Mexican Peso', MYR: 'Malaysian Ringgit', NOK: 'Norwegian Krone',
  NZD: 'New Zealand Dollar', PHP: 'Philippine Peso', PLN: 'Polish Zloty',
  RON: 'Romanian Leu', SEK: 'Swedish Krona', SGD: 'Singapore Dollar',
  THB: 'Thai Baht', TRY: 'Turkish Lira', USD: 'US Dollar',
  ZAR: 'South African Rand'
};

const POPULAR = ['USD', 'EUR', 'GBP', 'JPY', 'CAD', 'AUD', 'CHF', 'INR'];
const ZERO_DECIMAL = new Set(['JPY', 'KRW', 'HUF', 'ISK', 'IDR']);

/* ── DOM refs ── */
const fromInput = document.getElementById('fromAmount');
const toInput = document.getElementById('toAmount');
const fromSel = document.getElementById('fromCurrency');
const toSel = document.getElementById('toCurrency');
const swapBtn = document.getElementById('swapBtn');
const rateForward = document.getElementById('rateForward');
const rateReverse = document.getElementById('rateReverse');
const rateInfo = document.getElementById('rateInfo');
const updatedLine = document.getElementById('updatedLine');
const updatedText = document.getElementById('updatedText');
const statusDot = document.getElementById('statusDot');
const errorMsg = document.getElementById('errorMsg');
const quickChips = document.getElementById('quickChips');

/* ── State ── */
let rates = null;
let lastUpdated = null;
let isCached = false;
let lastEdited = 'from';
let fromCur = localStorage.getItem('cc_from') || 'USD';
let toCur = localStorage.getItem('cc_to') || 'EUR';

/* ── Populate selects ── */
function populateSelects() {
  const allCodes = Object.keys(CURRENCIES).sort();
  const rest = allCodes.filter(c => !POPULAR.includes(c));

  [fromSel, toSel].forEach(sel => {
    sel.innerHTML = '';
    const popGroup = document.createElement('optgroup');
    popGroup.label = 'Popular';
    POPULAR.forEach(code => {
      popGroup.appendChild(new Option(code + ' \u2013 ' + CURRENCIES[code], code));
    });
    sel.appendChild(popGroup);

    const allGroup = document.createElement('optgroup');
    allGroup.label = 'All Currencies';
    rest.forEach(code => {
      allGroup.appendChild(new Option(code + ' \u2013 ' + CURRENCIES[code], code));
    });
    sel.appendChild(allGroup);
  });

  fromSel.value = fromCur;
  toSel.value = toCur;
}

/* ── Quick pick chips ── */
function buildQuickChips() {
  quickChips.innerHTML = '';
  POPULAR.forEach(code => {
    const btn = document.createElement('button');
    btn.className = 'quick-chip' + (code === fromCur ? ' active' : '');
    btn.textContent = code;
    btn.addEventListener('click', () => {
      if (code === fromCur) return;
      if (code === toCur) {
        toCur = fromCur;
        toSel.value = toCur;
        localStorage.setItem('cc_to', toCur);
      }
      fromCur = code;
      fromSel.value = code;
      localStorage.setItem('cc_from', fromCur);
      lastEdited = 'from';
      updateDisplay();
      highlightChips();
    });
    quickChips.appendChild(btn);
  });
}

function highlightChips() {
  quickChips.querySelectorAll('.quick-chip').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === fromCur);
  });
}

/* ── Conversion ── */
function getDecimals(code) { return ZERO_DECIMAL.has(code) ? 0 : 2; }

function convert(amount, from, to) {
  if (!rates || !rates[from] || !rates[to]) return null;
  if (from === to) return amount;
  return amount * (rates[to] / rates[from]);
}

function formatRate(r) {
  if (r >= 1000) return r.toFixed(2);
  if (r >= 100) return r.toFixed(3);
  return r.toFixed(4);
}

/* ── Update display ── */
function updateDisplay() {
  if (!rates) return;

  if (lastEdited === 'from') {
    const amt = parseFloat(fromInput.value);
    if (!isNaN(amt) && amt >= 0) {
      const result = convert(amt, fromCur, toCur);
      toInput.value = result !== null ? result.toFixed(getDecimals(toCur)) : '';
    } else {
      toInput.value = '';
    }
  } else {
    const amt = parseFloat(toInput.value);
    if (!isNaN(amt) && amt >= 0) {
      const result = convert(amt, toCur, fromCur);
      fromInput.value = result !== null ? result.toFixed(getDecimals(fromCur)) : '';
    } else {
      fromInput.value = '';
    }
  }

  // Rate display
  const fwd = convert(1, fromCur, toCur);
  const rev = convert(1, toCur, fromCur);
  if (fwd !== null && rev !== null) {
    rateForward.innerHTML = '1 ' + fromCur + ' = <strong>' + formatRate(fwd) + ' ' + toCur + '</strong>';
    rateReverse.innerHTML = '1 ' + toCur + ' = <strong>' + formatRate(rev) + ' ' + fromCur + '</strong>';
  }

  // Timestamp
  if (lastUpdated) {
    updatedLine.style.display = '';
    const d = new Date(lastUpdated + 'T00:00:00');
    updatedText.textContent = 'Rates from ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    statusDot.className = 'status-dot ' + (isCached ? 'cached' : 'fresh');
    statusDot.title = isCached ? 'Using cached rates' : 'Rates up to date';
  }

  highlightChips();
}

/* ── Fetch rates ── */
async function fetchRates() {
  // Try cached rates first for instant display
  const cachedRates = localStorage.getItem('cc_rates');
  const cachedDate = localStorage.getItem('cc_date');
  if (cachedRates) {
    try {
      rates = JSON.parse(cachedRates);
      lastUpdated = cachedDate;
      isCached = true;
      updateDisplay();
    } catch(e) { /* ignore bad cache */ }
  }

  // Fetch fresh rates
  rateInfo.classList.add('loading');
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);
    const res = await fetch('https://api.frankfurter.app/latest', { signal: controller.signal });
    clearTimeout(timeout);
    if (!res.ok) throw new Error('API returned ' + res.status);
    const data = await res.json();
    rates = { EUR: 1, ...data.rates };
    lastUpdated = data.date;
    isCached = false;
    localStorage.setItem('cc_rates', JSON.stringify(rates));
    localStorage.setItem('cc_date', data.date);
    errorMsg.classList.remove('visible');
    updateDisplay();
  } catch(e) {
    if (!rates) {
      errorMsg.classList.add('visible');
      rateForward.textContent = 'Could not load rates';
      rateReverse.textContent = '';
    }
    // If we have cached rates, they're already displayed
  } finally {
    rateInfo.classList.remove('loading');
  }
}

/* ── Event listeners ── */
fromInput.addEventListener('input', () => { lastEdited = 'from'; updateDisplay(); });
toInput.addEventListener('input', () => { lastEdited = 'to'; updateDisplay(); });

fromInput.addEventListener('focus', () => fromInput.select());
toInput.addEventListener('focus', () => toInput.select());

fromSel.addEventListener('change', () => {
  fromCur = fromSel.value;
  localStorage.setItem('cc_from', fromCur);
  lastEdited = 'from';
  updateDisplay();
});

toSel.addEventListener('change', () => {
  toCur = toSel.value;
  localStorage.setItem('cc_to', toCur);
  lastEdited = 'from';
  updateDisplay();
});

swapBtn.addEventListener('click', () => {
  // Animate
  swapBtn.classList.add('spinning');
  setTimeout(() => swapBtn.classList.remove('spinning'), 300);

  [fromCur, toCur] = [toCur, fromCur];
  fromSel.value = fromCur;
  toSel.value = toCur;
  localStorage.setItem('cc_from', fromCur);
  localStorage.setItem('cc_to', toCur);
  lastEdited = 'from';
  updateDisplay();
});

// Prevent negative values
[fromInput, toInput].forEach(input => {
  input.addEventListener('keydown', e => {
    if (e.key === '-' || e.key === 'e' || e.key === 'E') e.preventDefault();
  });
});

/* ── Init ── */
populateSelects();
buildQuickChips();
fetchRates();
</script>
