<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools - TheFreeFix.com</title>
<link rel="stylesheet" href="theme.css">
<style>
  .listing-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding-bottom: 32px;
  }
  .empty-state {
    max-width: 400px;
    width: 100%;
    padding: 48px 24px;
    margin: 0 16px;
    text-align: center;
    color: var(--text-dim);
    border: 1px dashed var(--card-border);
    border-radius: var(--radius-lg);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="listing-page">
    <a href="index.html" class="site-brand">TheFreeFix.com</a>

    <div class="game-header">
      <div class="header-left">
        <a href="index.html" class="icon-btn" title="Back" style="text-decoration:none;font-size:14px">&#x2190;</a>
        <span class="logo">Tools</span>
      </div>
      <div class="header-btns">
        <button class="icon-btn" id="themeBtn" title="Toggle theme">&#x1f319;</button>
      </div>
    </div>

    <div style="height:16px"></div>

    <div class="empty-state">
      <div class="empty-icon">&#x1f6e0;&#xfe0f;</div>
      <p>Tools are coming soon.<br>Check back for handy utilities and calculators.</p>
    </div>
  </div>

  <script src="theme.js"></script>
  <script>GameTheme.init();</script>
</body>
</html>
