<style>
  .listing-page {

    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
  }
  .listing-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px var(--accent);

  .listing-card .card-icon { font-size: 48px; line-height: 1; }
  .listing-card .card-name { font-size: 18px; font-weight: 700; }
