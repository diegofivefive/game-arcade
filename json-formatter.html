<script>
// === State ===
var currentView = 'formatted';
var parsedData = null;
var formattedJson = '';
var toastTimer = null;

// === DOM refs ===
var jsonInput = document.getElementById('jsonInput');
var charCount = document.getElementById('charCount');
var formatBtn = document.getElementById('formatBtn');
var minifyBtn = document.getElementById('minifyBtn');
var validateBtn = document.getElementById('validateBtn');
var clearBtn = document.getElementById('clearBtn');
var indentSelect = document.getElementById('indentSelect');
var statusBar = document.getElementById('statusBar');
var statusIcon = document.getElementById('statusIcon');
var statusText = document.getElementById('statusText');
var statsRow = document.getElementById('statsRow');
var viewToggle = document.getElementById('viewToggle');
var outputWrapper = document.getElementById('outputWrapper');
var outputBox = document.getElementById('outputBox');
var treeView = document.getElementById('treeView');
var copyBtn = document.getElementById('copyBtn');
var copyToast = document.getElementById('copyToast');

// === Utilities ===
function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function getIndent() {
  var val = indentSelect.value;
  if (val === 'tab') return '\t';
  return parseInt(val, 10);
}

function updateCharCount() {
  var len = jsonInput.value.length;
  charCount.textContent = len.toLocaleString() + ' char' + (len !== 1 ? 's' : '');
}

function setStatus(type, html) {
  statusIcon.className = 'status-icon ' + type;
  if (type === 'valid') statusIcon.textContent = '\u2713';
  else if (type === 'invalid') statusIcon.textContent = '!';
  else statusIcon.textContent = '?';
  statusText.innerHTML = html;
}

function showToast(msg) {
  copyToast.textContent = msg;
  copyToast.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() {
    copyToast.classList.remove('visible');
  }, 1800);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(function() {
    showToast('Copied to clipboard!');
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard!');
  });
}

// === Parse & validate ===
function tryParse(str) {
  str = str.trim();
  if (!str) return { ok: false, error: 'Empty input', data: null };
  try {
    var data = JSON.parse(str);
    return { ok: true, error: null, data: data };
  } catch (e) {
    return { ok: false, error: e.message, data: null };
  }
}

function getErrorPosition(errMsg) {
  var m = errMsg.match(/position\s+(\d+)/i);
  if (m) return parseInt(m[1], 10);
  m = errMsg.match(/column\s+(\d+)/i);
  if (m) return parseInt(m[1], 10);
  return -1;
}

function posToLineCol(str, pos) {
  if (pos < 0 || pos > str.length) return null;
  var lines = str.substring(0, pos).split('\n');
  return { line: lines.length, col: lines[lines.length - 1].length + 1 };
}

// === Stats ===
function computeStats(data) {
  var stats = { keys: 0, values: 0, arrays: 0, objects: 0, depth: 0, strings: 0, numbers: 0, booleans: 0, nulls: 0 };
  function walk(node, depth) {
    if (depth > stats.depth) stats.depth = depth;
    if (node === null) { stats.nulls++; stats.values++; return; }
    if (typeof node === 'string') { stats.strings++; stats.values++; return; }
    if (typeof node === 'number') { stats.numbers++; stats.values++; return; }
    if (typeof node === 'boolean') { stats.booleans++; stats.values++; return; }
    if (Array.isArray(node)) {
      stats.arrays++;
      for (var i = 0; i < node.length; i++) walk(node[i], depth + 1);
      return;
    }
    if (typeof node === 'object') {
      stats.objects++;
      var keys = Object.keys(node);
      stats.keys += keys.length;
      for (var k = 0; k < keys.length; k++) walk(node[keys[k]], depth + 1);
    }
  }
  walk(data, 0);
  return stats;
}

function renderStats(stats) {
  var items = [];
  if (stats.keys > 0) items.push('Keys: <span>' + stats.keys + '</span>');
  if (stats.objects > 0) items.push('Objects: <span>' + stats.objects + '</span>');
  if (stats.arrays > 0) items.push('Arrays: <span>' + stats.arrays + '</span>');
  items.push('Depth: <span>' + stats.depth + '</span>');
  statsRow.innerHTML = items.map(function(h) { return '<div class="stat-item">' + h + '</div>'; }).join('');
  statsRow.classList.add('visible');
}

// === Syntax highlighting ===
function highlightJson(str) {
  return escapeHtml(str).replace(
    /("(?:\\.|[^"\\])*")\s*:/g,
    '<span class="hl-key">$1</span>:'
  ).replace(
    /:\s*("(?:\\.|[^"\\])*")/g,
    function(match, val) {
      return ': <span class="hl-str">' + val + '</span>';
    }
  ).replace(
    /(?<=[\[,\n]\s*)("(?:\\.|[^"\\])*")(?=\s*[,\]\n])/g,
    '<span class="hl-str">$1</span>'
  ).replace(
    /\b(-?\d+\.?\d*(?:[eE][+-]?\d+)?)\b/g,
    '<span class="hl-num">$1</span>'
  ).replace(
    /\b(true|false)\b/g,
    '<span class="hl-bool">$1</span>'
  ).replace(
    /\bnull\b/g,
    '<span class="hl-null">null</span>'
  );
}

// === Tree view ===
function buildTree(data, key, isLast) {
  var html = '';
  var comma = isLast ? '' : ',';

  if (data === null) {
    var prefix = key !== undefined ? '<span class="tree-key">"' + escapeHtml(String(key)) + '"</span>: ' : '';
    return '<div>' + prefix + '<span class="tree-null">null</span>' + comma + '</div>';
  }

  var type = typeof data;

  if (type === 'string') {
    var prefix = key !== undefined ? '<span class="tree-key">"' + escapeHtml(String(key)) + '"</span>: ' : '';
    var display = data.length > 80 ? data.substring(0, 80) + '\u2026' : data;
    return '<div>' + prefix + '<span class="tree-str">"' + escapeHtml(display) + '"</span>' + comma + '</div>';
  }

  if (type === 'number') {
    var prefix = key !== undefined ? '<span class="tree-key">"' + escapeHtml(String(key)) + '"</span>: ' : '';
    return '<div>' + prefix + '<span class="tree-num">' + data + '</span>' + comma + '</div>';
  }

  if (type === 'boolean') {
    var prefix = key !== undefined ? '<span class="tree-key">"' + escapeHtml(String(key)) + '"</span>: ' : '';
    return '<div>' + prefix + '<span class="tree-bool">' + data + '</span>' + comma + '</div>';
  }

  if (Array.isArray(data)) {
    var prefix = key !== undefined ? '<span class="tree-key">"' + escapeHtml(String(key)) + '"</span>: ' : '';
    var id = 'tn' + Math.random().toString(36).substr(2, 8);
    html += '<div>' + prefix + '<span class="tree-toggle" data-target="' + id + '"><span class="tree-bracket">[</span></span> <span class="tree-bracket" style="font-size:10px;color:var(--text-dim)">' + data.length + ' items</span>';
    html += '<div class="tree-node" id="' + id + '">';
    for (var i = 0; i < data.length; i++) {
      html += buildTree(data[i], undefined, i === data.length - 1);
    }
    html += '</div><span class="tree-bracket">]</span>' + comma + '</div>';
    return html;
  }

  if (type === 'object') {
    var keys = Object.keys(data);
    var prefix = key !== undefined ? '<span class="tree-key">"' + escapeHtml(String(key)) + '"</span>: ' : '';
    var id = 'tn' + Math.random().toString(36).substr(2, 8);
    html += '<div>' + prefix + '<span class="tree-toggle" data-target="' + id + '"><span class="tree-bracket">{</span></span> <span class="tree-bracket" style="font-size:10px;color:var(--text-dim)">' + keys.length + ' keys</span>';
    html += '<div class="tree-node" id="' + id + '">';
    for (var i = 0; i < keys.length; i++) {
      html += buildTree(data[keys[i]], keys[i], i === keys.length - 1);
    }
    html += '</div><span class="tree-bracket">}</span>' + comma + '</div>';
    return html;
  }

  return '';
}

function renderTree(data) {
  treeView.innerHTML = buildTree(data, undefined, true);
  // Wire toggle clicks
  treeView.addEventListener('click', function(e) {
    var toggle = e.target.closest('.tree-toggle');
    if (!toggle) return;
    var targetId = toggle.dataset.target;
    var targetEl = document.getElementById(targetId);
    if (!targetEl) return;
    toggle.classList.toggle('collapsed');
    targetEl.classList.toggle('tree-hidden');
  });
}

// === Actions ===
function doFormat() {
  var raw = jsonInput.value;
  var result = tryParse(raw);
  jsonInput.classList.toggle('has-error', !result.ok);

  if (!result.ok) {
    var pos = getErrorPosition(result.error);
    var locStr = '';
    if (pos >= 0) {
      var loc = posToLineCol(raw, pos);
      if (loc) locStr = ' at <strong>line ' + loc.line + ', column ' + loc.col + '</strong>';
    }
    setStatus('invalid', '<span class="error-detail">Invalid JSON' + locStr + '</span><br>' + escapeHtml(result.error));
    outputWrapper.classList.remove('visible');
    treeView.classList.remove('visible');
    viewToggle.classList.remove('visible');
    statsRow.classList.remove('visible');
    return;
  }

  parsedData = result.data;
  var indent = getIndent();
  formattedJson = JSON.stringify(result.data, null, indent);
  var minLen = JSON.stringify(result.data).length;
  var stats = computeStats(result.data);

  setStatus('valid', '<span class="success-detail">Valid JSON</span> \u2014 formatted to <strong>' + formattedJson.length.toLocaleString() + '</strong> chars (minified: ' + minLen.toLocaleString() + ')');

  outputBox.innerHTML = highlightJson(formattedJson);
  outputWrapper.classList.add('visible');
  viewToggle.classList.add('visible');
  renderStats(stats);
  renderTree(result.data);
  updateViewDisplay();
}

function doMinify() {
  var raw = jsonInput.value;
  var result = tryParse(raw);
  jsonInput.classList.toggle('has-error', !result.ok);

  if (!result.ok) {
    var pos = getErrorPosition(result.error);
    var locStr = '';
    if (pos >= 0) {
      var loc = posToLineCol(raw, pos);
      if (loc) locStr = ' at <strong>line ' + loc.line + ', column ' + loc.col + '</strong>';
    }
    setStatus('invalid', '<span class="error-detail">Invalid JSON' + locStr + '</span><br>' + escapeHtml(result.error));
    return;
  }

  var minified = JSON.stringify(result.data);
  jsonInput.value = minified;
  updateCharCount();
  var saved = raw.length - minified.length;
  setStatus('valid', '<span class="success-detail">Minified!</span> \u2014 <strong>' + minified.length.toLocaleString() + '</strong> chars' + (saved > 0 ? ' (saved ' + saved.toLocaleString() + ')' : ''));
  outputWrapper.classList.remove('visible');
  treeView.classList.remove('visible');
  viewToggle.classList.remove('visible');
  statsRow.classList.remove('visible');
}

function doValidate() {
  var raw = jsonInput.value;
  var result = tryParse(raw);
  jsonInput.classList.toggle('has-error', !result.ok);

  if (!result.ok) {
    if (!raw.trim()) {
      setStatus('empty', 'Enter some JSON to validate.');
    } else {
      var pos = getErrorPosition(result.error);
      var locStr = '';
      if (pos >= 0) {
        var loc = posToLineCol(raw, pos);
        if (loc) locStr = ' at <strong>line ' + loc.line + ', column ' + loc.col + '</strong>';
      }
      setStatus('invalid', '<span class="error-detail">Invalid JSON' + locStr + '</span><br>' + escapeHtml(result.error));
    }
    return;
  }

  var stats = computeStats(result.data);
  var type = Array.isArray(result.data) ? 'Array' : typeof result.data === 'object' ? 'Object' : typeof result.data;
  setStatus('valid', '<span class="success-detail">Valid JSON</span> \u2014 root type: <strong>' + type + '</strong>, ' + raw.length.toLocaleString() + ' chars');
  renderStats(stats);
}

function doClear() {
  jsonInput.value = '';
  jsonInput.classList.remove('has-error');
  updateCharCount();
  setStatus('empty', 'Paste or type JSON to get started.');
  outputWrapper.classList.remove('visible');
  treeView.classList.remove('visible');
  viewToggle.classList.remove('visible');
  statsRow.classList.remove('visible');
  parsedData = null;
  formattedJson = '';
}

// === View toggle ===
function updateViewDisplay() {
  if (currentView === 'formatted') {
    outputWrapper.classList.add('visible');
    treeView.classList.remove('visible');
  } else {
    outputWrapper.classList.remove('visible');
    treeView.classList.add('visible');
  }
}

viewToggle.addEventListener('click', function(e) {
  var btn = e.target.closest('.pill-btn');
  if (!btn) return;
  viewToggle.querySelectorAll('.pill-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentView = btn.dataset.view;
  updateViewDisplay();
});

// === Event listeners ===
formatBtn.addEventListener('click', doFormat);
minifyBtn.addEventListener('click', doMinify);
validateBtn.addEventListener('click', doValidate);
clearBtn.addEventListener('click', doClear);

jsonInput.addEventListener('input', updateCharCount);

// Tab key inserts tab/spaces in textarea
jsonInput.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    var indent = indentSelect.value === 'tab' ? '\t' : ' '.repeat(parseInt(indentSelect.value, 10));
    var start = jsonInput.selectionStart;
    var end = jsonInput.selectionEnd;
    jsonInput.value = jsonInput.value.substring(0, start) + indent + jsonInput.value.substring(end);
    jsonInput.selectionStart = jsonInput.selectionEnd = start + indent.length;
    updateCharCount();
  }
  // Ctrl/Cmd + Enter to format
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    doFormat();
  }
});

// Copy button
copyBtn.addEventListener('click', function() {
  if (formattedJson) {
    copyText(formattedJson);
    copyBtn.classList.add('copied');
    copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
    setTimeout(function() {
      copyBtn.classList.remove('copied');
      copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
    }, 2000);
  }
});

// Paste auto-format
jsonInput.addEventListener('paste', function() {
  setTimeout(function() {
    updateCharCount();
    var raw = jsonInput.value.trim();
    if (raw && raw.length > 2) {
      doFormat();
    }
  }, 50);
});

// === Init ===
GameTheme.init();
updateCharCount();
</script>
</body>
</html>
