  .game-page { padding-bottom: 32px; }
  .game-header { max-width: 560px; margin: 0 auto; }

  /* ── Layout ── */
  .pipe-container {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 8px;
    display: flex;
    flex-direction: column;
    align-items: center;

  /* ── Top bar: score / level / timer ── */

    display: flex;
    justify-content: space-between;
    align-items: center;

    gap: 8px;

  }
  .pipe-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 6px 14px;
    min-width: 70px;
    flex: 1;
  }
  .pipe-stat-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  .pipe-stat-value {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  /* ── Game area ── */
  .pipe-game-wrap {
    position: relative;
    width: 100%;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  /* Queue panel */
  .pipe-queue {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .pipe-queue-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 2px;
  }
  .pipe-queue-cell {
    width: 44px;
    height: 44px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
  }
  .pipe-queue-cell:first-of-type {
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
  }
  .pipe-queue-cell canvas {
    width: 36px;
    height: 36px;
  }

  /* Grid */
  .pipe-grid-wrap {
    flex: 1;
    display: flex;
    justify-content: center;
    position: relative;
  }
  .pipe-grid {
    display: grid;
    gap: 0;
    background: var(--bg2);
    border: 2px solid var(--card-border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .pipe-cell {
    background: var(--bg2);
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pipe-cell:hover { background: var(--btn-bg); }
  .pipe-cell.start-cell { cursor: default; }
  .pipe-cell.filled { cursor: pointer; }
  .pipe-cell.blocked {
    background: var(--bg);
    cursor: default;
  }
  .pipe-cell.blocked::after {
    content: '';
    position: absolute;
    inset: 25%;
    background: var(--card-border);
    border-radius: 2px;
    opacity: 0.5;
  }
  .pipe-cell canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Water filled cells glow */
  .pipe-cell.water-filled {
    box-shadow: inset 0 0 12px rgba(0, 180, 255, 0.3);
  }

  /* ── Place animation ── */
  .pipe-cell.just-placed canvas {
    animation: pipePop 0.25s ease-out;
  }
  @keyframes pipePop {
    0% { transform: scale(0.5); opacity: 0.5; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── Buttons row ── */
  .pipe-actions {
    display: flex;
    gap: 8px;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }
  .pipe-btn {
    background: var(--btn-bg);

  .pipe-diff-btn.active {

<script>
GameTheme.init();
Modal.bindOverlayClose();

/* ════════════════════════════════════════════
   PIPE DREAM — Connect pipes before water flows
   ════════════════════════════════════════════ */

(() => {
'use strict';

// ── Difficulty configs ──
const CONFIGS = {
  easy:   { cols: 7, rows: 7, preflow: 35, flowSpeed: 900, minPipes: 6,  blocks: 0, scoreMult: 1 },
  medium: { cols: 8, rows: 8, preflow: 28, flowSpeed: 700, minPipes: 10, blocks: 4, scoreMult: 1.5 },
  hard:   { cols: 9, rows: 9, preflow: 22, flowSpeed: 550, minPipes: 14, blocks: 6, scoreMult: 2 },
  expert: { cols: 10, rows: 10, preflow: 18, flowSpeed: 420, minPipes: 20, blocks: 10, scoreMult: 3 }
};

// ── Pipe types ──
// Each pipe has openings: top, right, bottom, left (TRBL)
const PIPE_TYPES = [
  { name: 'vertical',   openings: [1,0,1,0] },
  { name: 'horizontal', openings: [0,1,0,1] },
  { name: 'curve-tr',   openings: [1,1,0,0] },
  { name: 'curve-rb',   openings: [0,1,1,0] },
  { name: 'curve-bl',   openings: [0,0,1,1] },
  { name: 'curve-lt',   openings: [1,0,0,1] },
  { name: 'cross',      openings: [1,1,1,1] },
  { name: 'tee-trb',    openings: [1,1,1,0] },
  { name: 'tee-rbl',    openings: [0,1,1,1] },
  { name: 'tee-blt',    openings: [1,0,1,1] },
  { name: 'tee-ltr',    openings: [1,1,0,1] }
];

// Opposite direction index: T->B, R->L, B->T, L->R
const OPPOSITE = [2, 3, 0, 1];
// Direction deltas: [row, col] for T, R, B, L
const DIR_DELTA = [[-1,0],[0,1],[1,0],[0,-1]];

// ── Color palette ──
const COLORS = {
  pipe: '#5a5a8a',
  pipeStroke: '#7b6fff',
  pipeFill: '#2a2a55',
  water: '#00b4ff',
  waterGlow: 'rgba(0, 180, 255, 0.5)',
  waterTrail: '#00e6b8',
  start: '#ff5e94',
  startGlow: 'rgba(255, 94, 148, 0.5)',
  blocked: '#333355',
  cross2: '#00e6b8'
};

// ── State ──
let difficulty = 'easy';
let config = CONFIGS.easy;
let grid = [];         // 2D array of cell objects
let queue = [];        // upcoming pipe types
let score = 0;
let level = 1;
let pipesPlaced = 0;
let preflowTimer = 0;
let preflowInterval = null;
let flowInterval = null;
let flowPath = [];     // ordered array of {row, col, fromDir, toDir}
let flowIndex = 0;
let waterProgress = 0; // 0-1 within current cell
let gameActive = false;
let bombMode = false;
let startRow = 0, startCol = 0, startDir = 2; // start cell exit direction
let totalPipesFlowed = 0;

// Stats
const stats = new GameStatsManager('pipe-dream');
let bestScore = parseInt(localStorage.getItem('pd-best-score') || '0');
let totalPipesStat = parseInt(localStorage.getItem('pd-total-pipes') || '0');
let levelsWon = parseInt(localStorage.getItem('pd-levels-won') || '0');

// ── DOM refs ──
const gridEl = document.getElementById('pipeGrid');
const scoreEl = document.getElementById('scoreVal');
const levelEl = document.getElementById('levelVal');
const timerEl = document.getElementById('timerVal');
const pipesEl = document.getElementById('pipesVal');
const flowFill = document.getElementById('flowFill');
const gameOverEl = document.getElementById('gameOver');
const goTitle = document.getElementById('goTitle');
const goScore = document.getElementById('goScore');
const goDetail = document.getElementById('goDetail');
const replaceBtn = document.getElementById('replaceBtn');
const bombBtn = document.getElementById('bombBtn');

// ── Drawing helpers ──
function createCylinderGradient(ctx, x, y, w, h, isVertical, baseColor, highlightColor, shadowColor) {
  let grad;
  if (isVertical) {
    grad = ctx.createLinearGradient(x, y, x + w, y);
  } else {
    grad = ctx.createLinearGradient(x, y, x, y + h);
  }
  grad.addColorStop(0, shadowColor);
  grad.addColorStop(0.25, baseColor);
  grad.addColorStop(0.5, highlightColor);
  grad.addColorStop(0.75, baseColor);
  grad.addColorStop(1, shadowColor);
  return grad;
}

function drawPipeChannel(ctx, x, y, w, h, isVertical) {
  // Outer rim
  const rimGrad = createCylinderGradient(ctx, x, y, w, h, isVertical, '#4a4a7a', '#6a6aaa', '#2a2a50');
  ctx.fillStyle = rimGrad;
  ctx.fillRect(x, y, w, h);

  // Inner bore
  const inset = isVertical ? Math.max(2, w * 0.15) : Math.max(2, h * 0.15);
  const ix = isVertical ? x + inset : x;
  const iy = isVertical ? y : y + inset;
  const iw = isVertical ? w - inset * 2 : w;
  const ih = isVertical ? h : h - inset * 2;
  const innerGrad = createCylinderGradient(ctx, ix, iy, iw, ih, isVertical, '#1e1e44', '#2e2e5e', '#12122e');
  ctx.fillStyle = innerGrad;
  ctx.fillRect(ix, iy, iw, ih);
}

function drawPipe(canvas, pipeType, waterLevel, waterFrom, waterTo, isCrossSecond) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  ctx.clearRect(0, 0, s, s);

  const opens = pipeType.openings;
  const pw = s * 0.38;  // pipe width
  const cx = s / 2;
  const cy = s / 2;
  const halfPw = pw / 2;

  // Draw pipe channels with cylindrical gradient
  if (pipeType.name === 'cross') {
    drawPipeChannel(ctx, cx - halfPw, 0, pw, s, true);   // vertical
    drawPipeChannel(ctx, 0, cy - halfPw, s, pw, false);   // horizontal
    // Junction overlay
    const jGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, halfPw * 1.2);
    jGrad.addColorStop(0, '#2e2e5e');
    jGrad.addColorStop(1, '#1e1e44');
    ctx.fillStyle = jGrad;
    ctx.fillRect(cx - halfPw, cy - halfPw, pw, pw);
  } else {
    // Draw center junction first with radial gradient
    const jGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, halfPw * 1.1);
    jGrad.addColorStop(0, '#2e2e5e');
    jGrad.addColorStop(1, '#1e1e44');

    // Draw channels to edges (edge-to-edge: from 0 or center to s or center)
    if (opens[0]) drawPipeChannel(ctx, cx - halfPw, 0, pw, cy + halfPw, true);
    if (opens[2]) drawPipeChannel(ctx, cx - halfPw, cy - halfPw, pw, cy + halfPw, true);
    if (opens[3]) drawPipeChannel(ctx, 0, cy - halfPw, cx + halfPw, pw, false);
    if (opens[1]) drawPipeChannel(ctx, cx - halfPw, cy - halfPw, cx + halfPw, pw, false);

    // Smooth center junction
    ctx.fillStyle = jGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, halfPw * 0.85, 0, Math.PI * 2);
    ctx.fill();
  }

  // Rim highlights at openings (metallic cap effect)
  ctx.strokeStyle = 'rgba(120, 120, 180, 0.4)';
  ctx.lineWidth = 1.5;
  if (opens[0]) { ctx.beginPath(); ctx.moveTo(cx - halfPw, 0); ctx.lineTo(cx + halfPw, 0); ctx.stroke(); }
  if (opens[2]) { ctx.beginPath(); ctx.moveTo(cx - halfPw, s); ctx.lineTo(cx + halfPw, s); ctx.stroke(); }
  if (opens[3]) { ctx.beginPath(); ctx.moveTo(0, cy - halfPw); ctx.lineTo(0, cy + halfPw); ctx.stroke(); }
  if (opens[1]) { ctx.beginPath(); ctx.moveTo(s, cy - halfPw); ctx.lineTo(s, cy + halfPw); ctx.stroke(); }

  // Draw water
  if (waterLevel > 0 && waterFrom !== undefined) {
    drawWaterInPipe(ctx, pipeType, waterLevel, waterFrom, waterTo, isCrossSecond, s, cx, cy, pw);
  }
}

function drawWaterInPipe(ctx, pipeType, waterLevel, waterFrom, waterTo, isCrossSecond, s, cx, cy, pw) {
  const wc = isCrossSecond ? COLORS.cross2 : COLORS.water;
  const halfPw = pw / 2;
  const wp = pw * 0.5;
  const halfWp = wp / 2;

  ctx.globalAlpha = 0.9;

  if (pipeType.name === 'cross') {
    if (waterFrom === 0 || waterFrom === 2) {
      const wGrad = createCylinderGradient(ctx, cx - halfWp, 0, wp, s, true, wc, '#66d4ff', '#0070aa');
      ctx.fillStyle = wGrad;
      if (waterFrom === 0) ctx.fillRect(cx - halfWp, 0, wp, waterLevel * s);
      else ctx.fillRect(cx - halfWp, s - waterLevel * s, wp, waterLevel * s);
    } else {
      const wGrad = createCylinderGradient(ctx, 0, cy - halfWp, s, wp, false, wc, '#66d4ff', '#0070aa');
      ctx.fillStyle = wGrad;
      if (waterFrom === 3) ctx.fillRect(0, cy - halfWp, waterLevel * s, wp);
      else ctx.fillRect(s - waterLevel * s, cy - halfWp, waterLevel * s, wp);
    }
  } else {
    const progress = Math.min(waterLevel, 1);
    if (progress <= 0.5) {
      const seg = progress * 2;
      drawWaterSeg(ctx, waterFrom, seg, s, cx, cy, halfWp, wp, false, wc);
    } else {
      drawWaterSeg(ctx, waterFrom, 1, s, cx, cy, halfWp, wp, false, wc);
      drawWaterSeg(ctx, waterTo, (progress - 0.5) * 2, s, cx, cy, halfWp, wp, true, wc);
    }
  }
  ctx.globalAlpha = 1;
}

function drawWaterSeg(ctx, dir, progress, s, cx, cy, halfWp, wp, fromCenter, color) {
  const halfS = s / 2;
  const len = halfS * progress;
  if (len <= 0) return;

  let x, y, w, h, isV;
  if (dir === 0) {
    isV = true;
    if (fromCenter) { x = cx - halfWp; y = cy - len; w = wp; h = len; }
    else { x = cx - halfWp; y = halfS - len; w = wp; h = len; }
  } else if (dir === 2) {
    isV = true;
    if (fromCenter) { x = cx - halfWp; y = cy; w = wp; h = len; }
    else { x = cx - halfWp; y = s - halfS; w = wp; h = len; }
  } else if (dir === 3) {
    isV = false;
    if (fromCenter) { x = cx - len; y = cy - halfWp; w = len; h = wp; }
    else { x = halfS - len; y = cy - halfWp; w = len; h = wp; }
  } else {
    isV = false;
    if (fromCenter) { x = cx; y = cy - halfWp; w = len; h = wp; }
    else { x = s - halfS; y = cy - halfWp; w = len; h = wp; }
  }

  const wGrad = createCylinderGradient(ctx, x, y, w, h, isV, color, '#66d4ff', '#0070aa');
  ctx.fillStyle = wGrad;
  ctx.fillRect(x, y, w, h);
}

function drawStartPipe(canvas, exitDir) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  ctx.clearRect(0, 0, s, s);

  const cx = s / 2;
  const cy = s / 2;
  const pw = s * 0.38;
  const halfPw = pw / 2;

  // Exit channel with cylindrical gradient
  const isV = (exitDir === 0 || exitDir === 2);
  if (exitDir === 0) drawPipeChannel(ctx, cx - halfPw, 0, pw, cy, isV);
  if (exitDir === 1) drawPipeChannel(ctx, cx, cy - halfPw, cx, pw, isV);
  if (exitDir === 2) drawPipeChannel(ctx, cx - halfPw, cy, pw, cy, isV);
  if (exitDir === 3) drawPipeChannel(ctx, 0, cy - halfPw, cx, pw, isV);

  // Glow
  ctx.shadowColor = COLORS.startGlow;
  ctx.shadowBlur = 10;

  // Start marker with gradient
  const sGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, pw * 0.7);
  sGrad.addColorStop(0, '#ff8cb4');
  sGrad.addColorStop(0.6, COLORS.start);
  sGrad.addColorStop(1, '#cc3a6a');
  ctx.fillStyle = sGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, pw * 0.65, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // S label
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${s * 0.28}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', cx, cy + 1);
}

function drawQueuePipe(index) {
  const cell = document.getElementById('q' + index);
  if (!cell || !queue[index]) return;
  cell.innerHTML = '';
  const canvas = document.createElement('canvas');
  canvas.width = 72;
  canvas.height = 72;
  cell.appendChild(canvas);
  drawPipe(canvas, queue[index], 0);
}

// ── Grid management ──
function buildGrid() {
  grid = [];
  gridEl.innerHTML = '';
  gridEl.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;

  // Calculate cell size to maximize screen usage
  const availWidth = Math.min(560, window.innerWidth) - 70; // minus queue width + padding
  const availHeight = window.innerHeight - 340; // minus header/footer/controls
  const maxCellW = Math.floor(availWidth / config.cols);
  const maxCellH = Math.floor(availHeight / config.rows);
  const cellSize = Math.max(28, Math.min(maxCellW, maxCellH, 56));

  gridEl.style.width = cellSize * config.cols + 4 + 'px';

  for (let r = 0; r < config.rows; r++) {
    grid[r] = [];
    for (let c = 0; c < config.cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'pipe-cell';
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';
      cell.dataset.row = r;
      cell.dataset.col = c;

      const canvas = document.createElement('canvas');
      canvas.width = cellSize * 2; // retina
      canvas.height = cellSize * 2;
      cell.appendChild(canvas);

      cell.addEventListener('click', () => onCellClick(r, c));

      gridEl.appendChild(cell);
      grid[r][c] = {
        el: cell,
        canvas: canvas,
        pipe: null,
        blocked: false,
        isStart: false,
        waterLevel: 0,
        waterFrom: undefined,
        waterTo: undefined,
        isCrossSecond: false
      };
    }
  }
}

function placeBlocks() {
  let placed = 0;
  const attempts = config.blocks * 10;
  let tries = 0;
  while (placed < config.blocks && tries < attempts) {
    tries++;
    const r = Math.floor(Math.random() * config.rows);
    const c = Math.floor(Math.random() * config.cols);
    if (grid[r][c].isStart || grid[r][c].blocked) continue;
    // Don't block cells adjacent to start
    if (Math.abs(r - startRow) + Math.abs(c - startCol) <= 1) continue;
    grid[r][c].blocked = true;
    grid[r][c].el.classList.add('blocked');
    grid[r][c].canvas.style.display = 'none';
    placed++;
  }
}

function placeStart() {
  // Place start on a random edge
  const edge = Math.floor(Math.random() * 4);
  if (edge === 0) { startRow = 0; startCol = 1 + Math.floor(Math.random() * (config.cols - 2)); startDir = 2; }
  else if (edge === 1) { startRow = 1 + Math.floor(Math.random() * (config.rows - 2)); startCol = config.cols - 1; startDir = 3; }
  else if (edge === 2) { startRow = config.rows - 1; startCol = 1 + Math.floor(Math.random() * (config.cols - 2)); startDir = 0; }
  else { startRow = 1 + Math.floor(Math.random() * (config.rows - 2)); startCol = 0; startDir = 1; }

  grid[startRow][startCol].isStart = true;
  grid[startRow][startCol].el.classList.add('start-cell');
  drawStartPipe(grid[startRow][startCol].canvas, startDir);
}

// ── Queue ──
function fillQueue() {
  while (queue.length < 6) {
    // Weighted random: straights and curves more common
    const weights = [3, 3, 2, 2, 2, 2, 1, 1, 1, 1, 1]; // match PIPE_TYPES order
    const totalW = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * totalW;
    let idx = 0;
    for (let i = 0; i < weights.length; i++) {
      r -= weights[i];
      if (r <= 0) { idx = i; break; }
    }
    queue.push(PIPE_TYPES[idx]);
  }
  for (let i = 0; i < 5; i++) drawQueuePipe(i);
}

function nextPipe() {
  const pipe = queue.shift();
  fillQueue();
  return pipe;
}

// ── Cell interaction ──
function onCellClick(r, c) {
  if (!gameActive) return;
  const cell = grid[r][c];

  if (bombMode) {
    bombMode = false;
    bombBtn.classList.remove('active');
    document.body.style.cursor = '';
    if (cell.pipe && !cell.isStart && cell.waterLevel === 0) {
      cell.pipe = null;
      cell.el.classList.remove('filled');
      const ctx = cell.canvas.getContext('2d');
      ctx.clearRect(0, 0, cell.canvas.width, cell.canvas.height);
      score = Math.max(0, score - 20);
      updateScore();
    }
    return;
  }

  if (cell.isStart || cell.blocked) return;
  // Can't place on cells that already have water
  if (cell.waterLevel > 0) return;

  // Place or replace pipe
  const isReplace = cell.pipe !== null;
  if (isReplace) {
    score = Math.max(0, score - 20);
  } else {
    pipesPlaced++;
  }

  cell.pipe = nextPipe();
  cell.el.classList.add('filled', 'just-placed');
  setTimeout(() => cell.el.classList.remove('just-placed'), 300);
  drawPipe(cell.canvas, cell.pipe, 0);
  updatePipes();
  updateScore();
}

// ── Flow simulation ──
function startPreflow() {
  preflowTimer = config.preflow;
  timerEl.textContent = preflowTimer;

  preflowInterval = setInterval(() => {
    preflowTimer--;
    timerEl.textContent = preflowTimer;

    if (preflowTimer <= 5) {
      timerEl.style.color = '#ff5e94';
    }

    if (preflowTimer <= 0) {
      clearInterval(preflowInterval);
      preflowInterval = null;
      timerEl.style.color = '';
      startFlow();
    }
  }, 1000);
}

function startFlow() {
  // Build flow path starting from start cell
  flowPath = [];
  flowIndex = 0;
  waterProgress = 0;
  totalPipesFlowed = 0;

  // First step: exit start cell
  let curRow = startRow + DIR_DELTA[startDir][0];
  let curCol = startCol + DIR_DELTA[startDir][1];
  let entryDir = OPPOSITE[startDir]; // direction water enters from

  // Animate water coming out of start cell
  const startCell = grid[startRow][startCol];
  startCell.waterLevel = 1;
  startCell.waterFrom = OPPOSITE[startDir]; // dummy
  startCell.waterTo = startDir;

  drawStartPipeWater(startCell.canvas, startDir);
  advanceFlow(curRow, curCol, entryDir);
}

function drawStartPipeWater(canvas, exitDir) {
  drawStartPipe(canvas, exitDir);
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const cx = s / 2;
  const cy = s / 2;
  const wp = s * 0.19;
  const isV = (exitDir === 0 || exitDir === 2);

  ctx.globalAlpha = 0.9;
  let x, y, w, h;
  if (exitDir === 0) { x = cx - wp; y = 0; w = wp * 2; h = cy; }
  else if (exitDir === 1) { x = cx; y = cy - wp; w = cx; h = wp * 2; }
  else if (exitDir === 2) { x = cx - wp; y = cy; w = wp * 2; h = cy; }
  else { x = 0; y = cy - wp; w = cx; h = wp * 2; }
  const wGrad = createCylinderGradient(ctx, x, y, w, h, isV, COLORS.water, '#66d4ff', '#0070aa');
  ctx.fillStyle = wGrad;
  ctx.fillRect(x, y, w, h);
  ctx.globalAlpha = 1;
}

function advanceFlow(row, col, entryDir) {
  // Check bounds
  if (row < 0 || row >= config.rows || col < 0 || col >= config.cols) {
    endFlow(false);
    return;
  }

  const cell = grid[row][col];

  // No pipe or blocked
  if (!cell.pipe || cell.blocked || cell.isStart) {
    endFlow(false);
    return;
  }

  // Check if pipe has opening on entry side
  if (!cell.pipe.openings[entryDir]) {
    endFlow(false);
    return;
  }

  // For cross pipes, check if already partially used
  if (cell.pipe.name === 'cross' && cell.waterLevel > 0) {
    // Cross can carry water twice (horizontal + vertical)
    if ((entryDir === 0 || entryDir === 2) && (cell.waterFrom === 0 || cell.waterFrom === 2)) {
      endFlow(false); return; // same channel already used
    }
    if ((entryDir === 1 || entryDir === 3) && (cell.waterFrom === 1 || cell.waterFrom === 3)) {
      endFlow(false); return;
    }
    cell.isCrossSecond = true;
  } else if (cell.waterLevel > 0) {
    // Non-cross pipe already has water
    endFlow(false);
    return;
  }

  // Find exit direction
  let exitDir = -1;
  if (cell.pipe.name === 'cross') {
    // Cross: water goes straight through
    exitDir = OPPOSITE[entryDir];
  } else {
    for (let d = 0; d < 4; d++) {
      if (d !== entryDir && cell.pipe.openings[d]) {
        exitDir = d;
        break;
      }
    }
  }

  if (exitDir === -1) {
    endFlow(false);
    return;
  }

  // Animate water filling this cell
  cell.waterFrom = entryDir;
  cell.waterTo = exitDir;

  animateWaterFill(row, col, entryDir, exitDir, () => {
    totalPipesFlowed++;
    updateFlowBar();
    score += Math.round(100 * config.scoreMult);
    if (cell.isCrossSecond) score += Math.round(50 * config.scoreMult); // bonus for cross
    updateScore();

    cell.el.classList.add('water-filled');

    // Next cell
    const nextRow = row + DIR_DELTA[exitDir][0];
    const nextCol = col + DIR_DELTA[exitDir][1];
    const nextEntry = OPPOSITE[exitDir];

    advanceFlow(nextRow, nextCol, nextEntry);
  });
}

function animateWaterFill(row, col, fromDir, toDir, onComplete) {
  const cell = grid[row][col];
  const duration = config.flowSpeed;
  const startTime = performance.now();

  function tick(now) {
    if (!gameActive) return;
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    cell.waterLevel = progress;

    drawPipe(cell.canvas, cell.pipe, progress, fromDir, toDir, cell.isCrossSecond);

    if (progress < 1) {
      requestAnimationFrame(tick);
    } else {
      cell.waterLevel = 1;
      onComplete();
    }
  }
  requestAnimationFrame(tick);
}

function updateFlowBar() {
  const pct = Math.min((totalPipesFlowed / config.minPipes) * 100, 100);
  flowFill.style.width = pct + '%';
  if (pct >= 100) {
    flowFill.style.background = 'linear-gradient(90deg, #00e6b8, #7b6fff)';
  }
}

function endFlow(isWin) {
  gameActive = false;
  const won = totalPipesFlowed >= config.minPipes;

  // Record stats
  stats.addPlay();
  totalPipesStat += pipesPlaced;
  localStorage.setItem('pd-total-pipes', totalPipesStat);

  if (won) {
    stats.addWin();
    levelsWon++;
    localStorage.setItem('pd-levels-won', levelsWon);
    score += Math.round(200 * level * config.scoreMult);
    updateScore();

    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('pd-best-score', bestScore);
    }

    Confetti.launch(100);
    goTitle.textContent = 'Level Complete!';
    goScore.textContent = `Score: ${score}`;
    goDetail.textContent = `${totalPipesFlowed} pipes filled (needed ${config.minPipes})`;
    document.getElementById('goRestart').textContent = 'Next Level';
    document.getElementById('goRestart').onclick = () => {
      gameOverEl.classList.remove('active');
      level++;
      config = { ...CONFIGS[difficulty] };
      config.minPipes += level * 2;
      config.preflow = Math.max(10, config.preflow - level);
      config.flowSpeed = Math.max(250, config.flowSpeed - level * 20);
      startGame(true);
    };
  } else {
    stats.resetStreak();
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('pd-best-score', bestScore);
    }
    goTitle.textContent = 'Game Over';
    goScore.textContent = `Score: ${score}`;
    goDetail.textContent = `${totalPipesFlowed}/${config.minPipes} pipes filled`;
    document.getElementById('goRestart').textContent = 'Play Again';
    document.getElementById('goRestart').onclick = () => {
      gameOverEl.classList.remove('active');
      level = 1;
      score = 0;
      startGame(false);
    };
  }

  setTimeout(() => gameOverEl.classList.add('active'), 600);
}

// ── UI updates ──
function updateScore() { scoreEl.textContent = score; }
function updatePipes() { pipesEl.textContent = pipesPlaced; }

// ── Stats modal ──
function updateStatsModal() {
  document.getElementById('statPlayed').textContent = stats.played;
  document.getElementById('statWon').textContent = stats.won;
  document.getElementById('statStreak').textContent = stats.streak;
  document.getElementById('statBest').textContent = bestScore;
  document.getElementById('statPipes').textContent = totalPipesStat;
  document.getElementById('statLevels').textContent = levelsWon;
}

document.getElementById('statsBtn').addEventListener('click', () => {
  updateStatsModal();
  Modal.show('statsModal');
});

// ── Bomb mode ──
bombBtn.addEventListener('click', () => {
  if (!gameActive) return;
  bombMode = !bombMode;
  bombBtn.classList.toggle('active', bombMode);
  document.body.style.cursor = bombMode ? 'crosshair' : '';
});

// ── Skip pipe ──
replaceBtn.addEventListener('click', () => {
  if (!gameActive) return;
  score = Math.max(0, score - 50);
  updateScore();
  nextPipe(); // discard current
});

// ── Difficulty ──
document.querySelectorAll('.pipe-diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pipe-diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    config = { ...CONFIGS[difficulty] };
    level = 1;
    score = 0;
    startGame(false);
  });
});

// ── New game ──
document.getElementById('newGameBtn').addEventListener('click', () => {
  level = 1;
  score = 0;
  startGame(false);
});

// ── Start game ──
function startGame(keepScore) {
  // Clean up
  if (preflowInterval) { clearInterval(preflowInterval); preflowInterval = null; }
  gameActive = false;
  bombMode = false;
  bombBtn.classList.remove('active');
  document.body.style.cursor = '';
  gameOverEl.classList.remove('active');
  timerEl.style.color = '';

  if (!keepScore) { score = 0; level = 1; }
  pipesPlaced = 0;
  totalPipesFlowed = 0;
  queue = [];

  updateScore();
  levelEl.textContent = level;
  updatePipes();
  flowFill.style.width = '0%';
  flowFill.style.background = '';

  buildGrid();
  placeStart();
  placeBlocks();
  fillQueue();

  gameActive = true;
  startPreflow();
}

// ── Handle resize ──
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (gameActive && preflowTimer > 0) {
      // Only rebuild during preflow (safe)
      const savedQueue = [...queue];
      const savedPipes = [];
      const savedTimer = preflowTimer;

      // Save placed pipes
      for (let r = 0; r < config.rows; r++) {
        for (let c = 0; c < config.cols; c++) {
          if (grid[r] && grid[r][c] && grid[r][c].pipe) {
            savedPipes.push({ r, c, pipe: grid[r][c].pipe });
          }
        }
      }

      buildGrid();
      placeStart();
      placeBlocks();

      // Restore pipes
      savedPipes.forEach(({ r, c, pipe }) => {
        if (grid[r] && grid[r][c] && !grid[r][c].blocked && !grid[r][c].isStart) {
          grid[r][c].pipe = pipe;
          grid[r][c].el.classList.add('filled');
          drawPipe(grid[r][c].canvas, pipe, 0);
        }
      });

      queue = savedQueue;
      fillQueue();
    }
  }, 300);
});

// ── Init ──
startGame(false);

})();
</script>
