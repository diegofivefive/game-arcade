const ABSURD_LABELS = ['Plausible', 'Stretching It', 'Suspicious', 'Absurd', 'Unhinged'];
const ABSURD_CLASSES = ['absurd-1', 'absurd-2', 'absurd-3', 'absurd-4', 'absurd-5'];
const ALL_CATS = ['work', 'school', 'social', 'chores', 'gym', 'dating'];

/* ── State ── */
let currentCat = 'any';
let currentExcuse = '';
let favorites = JSON.parse(localStorage.getItem('ex_favorites') || '[]');
let stats = JSON.parse(localStorage.getItem('ex_stats') || '{"generated":0,"saved":0,"copied":0}');
let lastExcuse = '';

/* ── DOM ── */
const excuseText = document.getElementById('excuseText');
const copyBtn = document.getElementById('copyBtn');
const catContainer = document.getElementById('categories');
const absurdSlider = document.getElementById('absurdSlider');
const absurdLabel = document.getElementById('absurdLabel');
const generateBtn = document.getElementById('generateBtn');
const saveBtn = document.getElementById('saveBtn');
const favsSection = document.getElementById('favsSection');
const favsList = document.getElementById('favsList');
const statGenerated = document.getElementById('statGenerated');
const statSaved = document.getElementById('statSaved');
const statCopied = document.getElementById('statCopied');
const nsfwToggle = document.getElementById('nsfwToggle');
const outputBox = document.querySelector('.ex-output');

/* ── Core ── */
function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generate() {
  const level = parseInt(absurdSlider.value) - 1;
  const isNsfw = nsfwToggle.checked;
  const db = isNsfw ? NSFW_EXCUSES : EXCUSES;
  let cats = currentCat === 'any' ? ALL_CATS : [currentCat];
  let cat = pickRandom(cats);
  let pool = db[cat][level];

  // Avoid repeating the same excuse
  let excuse = pickRandom(pool);
  let attempts = 0;
  while (excuse === lastExcuse && attempts < 10) {
    cat = pickRandom(cats);
    pool = db[cat][level];
    excuse = pickRandom(pool);
    attempts++;
  }
  lastExcuse = excuse;
  currentExcuse = excuse;

  // Animate
  excuseText.classList.remove('generating');
  void excuseText.offsetWidth;
  excuseText.textContent = excuse;
  excuseText.classList.add('generating');

  // NSFW visual indicator + disable save
  outputBox.classList.toggle('nsfw-active', isNsfw);
  saveBtn.disabled = isNsfw;
  saveBtn.style.opacity = isNsfw ? '0.3' : '';
  saveBtn.title = isNsfw ? 'Saving disabled in NSFW mode' : 'Save to favorites';

  // Update save button state
  if (!isNsfw) updateSaveBtn();

  // Stats
  stats.generated++;
  saveStats();
  renderStats();
}

function updateAbsurdLabel() {
  const v = parseInt(absurdSlider.value) - 1;
  absurdLabel.textContent = ABSURD_LABELS[v];
  absurdLabel.className = 'ex-slider-value ' + ABSURD_CLASSES[v];
}

/* ── Copy ── */
async function copyExcuse(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    btn.classList.add('copied');
    btn.textContent = '\u2713';
    stats.copied++;
    saveStats();
    renderStats();
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = '\uD83D\uDCCB';
    }, 1500);
  } catch(e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.classList.add('copied');
    btn.textContent = '\u2713';
    stats.copied++;
    saveStats();
    renderStats();
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = '\uD83D\uDCCB';
    }, 1500);
  }
}

/* ── Favorites ── */
function toggleFavorite() {
  if (!currentExcuse || currentExcuse === 'Click generate to get your first excuse...') return;
  const idx = favorites.indexOf(currentExcuse);
  if (idx > -1) {
    favorites.splice(idx, 1);
  } else {
    favorites.unshift(currentExcuse);
    if (favorites.length > 20) favorites.pop();
    stats.saved++;
    saveStats();
  }
  localStorage.setItem('ex_favorites', JSON.stringify(favorites));
  updateSaveBtn();
  renderFavorites();
  renderStats();
}

function removeFavorite(idx) {
  favorites.splice(idx, 1);
  localStorage.setItem('ex_favorites', JSON.stringify(favorites));
  renderFavorites();
  renderStats();
}

function updateSaveBtn() {
  const isFav = favorites.indexOf(currentExcuse) > -1;
  saveBtn.innerHTML = isFav ? '&#x2665;' : '&#x2661;';
  saveBtn.style.color = isFav ? 'var(--accent2)' : '';
}

function renderFavorites() {
  if (favorites.length === 0) {
    favsSection.style.display = 'none';
    return;
  }
  favsSection.style.display = '';
  statSaved.textContent = favorites.length;
  favsList.innerHTML = favorites.map((f, i) =>
    '<div class="ex-fav-item">' +
      '<span class="ex-fav-text">' + escapeHtml(f) + '</span>' +
      '<button class="ex-fav-copy" data-idx="' + i + '" title="Copy">\uD83D\uDCCB</button>' +
      '<button class="ex-fav-remove" data-idx="' + i + '" title="Remove">\u2715</button>' +
    '</div>'
  ).join('');
}

/* ── Stats ── */
function saveStats() {
  localStorage.setItem('ex_stats', JSON.stringify(stats));
}
function renderStats() {
  statGenerated.textContent = stats.generated;
  statSaved.textContent = favorites.length;
  statCopied.textContent = stats.copied;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ── Events ── */
generateBtn.addEventListener('click', generate);

copyBtn.addEventListener('click', () => {
  if (currentExcuse && currentExcuse !== 'Click generate to get your first excuse...') {
    copyExcuse(currentExcuse, copyBtn);
  }
});

saveBtn.addEventListener('click', toggleFavorite);

absurdSlider.addEventListener('input', updateAbsurdLabel);

catContainer.addEventListener('click', (e) => {
  const btn = e.target.closest('.ex-cat-btn');
  if (!btn) return;
  catContainer.querySelectorAll('.ex-cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
});

favsList.addEventListener('click', (e) => {
  const copyEl = e.target.closest('.ex-fav-copy');
  const removeEl = e.target.closest('.ex-fav-remove');
  if (copyEl) {
    const idx = parseInt(copyEl.dataset.idx);
    copyExcuse(favorites[idx], copyEl);
  }
  if (removeEl) {
    const idx = parseInt(removeEl.dataset.idx);
    removeFavorite(idx);
  }
});

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    generate();
  }
});

/* ── Init ── */
updateAbsurdLabel();
renderStats();
renderFavorites();
GameTheme.init();

})();
