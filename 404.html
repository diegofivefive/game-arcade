<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found - TheFreeFix.com</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0a0a1a">
<link rel="stylesheet" href="theme.css">
<style>
  .error-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 16px;
    gap: 16px;
    text-align: center;
  }
  .error-code {
    font-size: 96px;
    font-weight: 800;
    letter-spacing: -4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .error-message {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .error-desc {
    font-size: 14px;
    color: var(--text-dim);
    max-width: 400px;
    line-height: 1.6;
  }
  .error-link {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    padding: 10px 24px;
    border-radius: var(--radius-md);
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .error-link:hover {
    filter: brightness(1.15);
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <div class="error-page">
    <a href="index.html" class="site-brand">TheFreeFix.com</a>
    <div class="error-code">404</div>
    <div class="error-message">Page not found</div>
    <div class="error-desc">The page you're looking for doesn't exist or has been moved. Try heading back to the homepage.</div>
    <a href="index.html" class="error-link">Back to Home</a>

    <footer class="site-footer">
      <a href="about.html">About</a>
      <span class="footer-sep">&middot;</span>
      <a href="contact.html">Contact</a>
      <span class="footer-sep">&middot;</span>
      <a href="terms.html">Terms</a>
      <span class="footer-sep">&middot;</span>
      <a href="privacy.html">Privacy</a>
      <span class="footer-sep">&middot;</span>
      <a href="https://x.com/TheFreeFix" target="_blank" rel="noopener">X</a>
    </footer>
  </div>

  <script src="theme.js"></script>
  <script>GameTheme.init();</script>
</body>
</html>
