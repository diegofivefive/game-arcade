<link rel="stylesheet" href="theme.css">
<style>
  .game-page { padding-bottom: 32px; }
  .game-header { max-width: 560px; margin: 0 auto; }

  .tool-content {
    width: 100%;
    max-width: 560px;
    padding: 0 16px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;

  .wc-input {
    width: 100%;
    min-height: 200px;
    padding: 14px 16px;
    border: 1px solid var(--card-border);
    border-radius: var(--radius-md);
    background: var(--card);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    line-height: 1.6;
    transition: border-color var(--transition);
    outline: none;
    resize: vertical;
    box-sizing: border-box;
  }
  .wc-input:focus { border-color: var(--accent); }
  .wc-input::placeholder { color: var(--text-dim); }

  .stats-grid {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .wc-stat {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-md);
    padding: 14px 10px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .wc-stat .val {
    font-size: 24px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .wc-stat .lbl {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  @media (max-width: 400px) {
    .tool-content { padding: 0 12px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .wc-stat .val { font-size: 20px; }
  }
</style>

<script src="theme.js"></script>
<script>
const input = document.getElementById('textInput');
const els = {
  words: document.getElementById('words'),
  chars: document.getElementById('chars'),
  charsNoSpace: document.getElementById('charsNoSpace'),
  sentences: document.getElementById('sentences'),
  paragraphs: document.getElementById('paragraphs'),
  readTime: document.getElementById('readTime')
};

function update() {
  const text = input.value;
  const trimmed = text.trim();

  const words = trimmed ? trimmed.split(/\s+/).length : 0;
  const chars = text.length;
  const charsNoSpace = text.replace(/\s/g, '').length;
  const sentences = trimmed ? (trimmed.match(/[.!?]+(?=\s|$)/g) || []).length : 0;
  const paragraphs = trimmed ? trimmed.split(/\n\s*\n/).filter(p => p.trim()).length : 0;

  // Average reading speed: 238 words per minute
  const totalSeconds = Math.ceil((words / 238) * 60);
  let readTime;
  if (totalSeconds < 60) readTime = totalSeconds + 's';
  else if (totalSeconds < 3600) readTime = Math.ceil(totalSeconds / 60) + 'm';
  else readTime = Math.floor(totalSeconds / 3600) + 'h ' + Math.ceil((totalSeconds % 3600) / 60) + 'm';

  els.words.textContent = words.toLocaleString();
  els.chars.textContent = chars.toLocaleString();
  els.charsNoSpace.textContent = charsNoSpace.toLocaleString();
  els.sentences.textContent = sentences.toLocaleString();
  els.paragraphs.textContent = paragraphs || (trimmed ? 1 : 0);
  els.readTime.textContent = readTime;
}

input.addEventListener('input', update);
GameTheme.init();
</script>
