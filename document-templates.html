/* ── PDF Helpers ── */
const H = {
  M: 20, W: 170,
  title(doc, text, y) {
    doc.setFontSize(20); doc.setFont('helvetica','bold'); doc.setTextColor(0);
    doc.text(text, 105, y, {align:'center'}); return y + 10;
  },
  section(doc, text, y) {
    doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(0);
    doc.text(text, 20, y); return y + 6;
  },
  label(doc, text, x, y) {
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(100);
    doc.text(text, x, y); doc.setTextColor(0); return y + 4;
  },
  text(doc, text, y, opts) {
    const o = opts || {};
    doc.setFontSize(o.size || 10); doc.setFont('helvetica', o.bold ? 'bold' : 'normal');
    doc.setTextColor(o.color || 0);
    const lines = doc.splitTextToSize(String(text || ''), o.mw || 170);
    doc.text(lines, o.x || 20, y, o.align ? {align: o.align} : undefined);
    return y + lines.length * (o.lh || 4.5);
  },
  line(doc, y, x1, x2) {
    doc.setDrawColor(200); doc.setLineWidth(0.3);
    doc.line(x1||20, y, x2||190, y); return y + 4;
  },
  sigLine(doc, lbl, x, y, w) {
    doc.setDrawColor(0); doc.setLineWidth(0.3);
    doc.line(x, y, x + (w||70), y);
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(80);
    doc.text(lbl, x, y + 4); doc.setTextColor(0); return y + 12;
  },
  disclaimer() {},
  pageCheck(doc, y, need) { if (y + (need||25) > 275) { doc.addPage(); return 20; } return y; },
  today() { return new Date().toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}); }
};

function fill(text, d) { return text.replace(/\{\{(\w+)\}\}/g, (_, k) => d[k] || '________'); }

/* ── Legal Template Renderer ── */
function renderLegal(doc, d, title, intro, sections, parties) {
  let y = 20;
  y = H.title(doc, title, y);
  y = H.line(doc, y);
  if (intro) { y = H.text(doc, fill(intro, d), y); y += 2; }
  sections.forEach((s, i) => {
    y = H.pageCheck(doc, y, 20);
    y = H.section(doc, (i+1) + '. ' + s.t, y);
    y = H.text(doc, fill(s.b, d), y);
    y += 3;
  });
  y = H.pageCheck(doc, y, 40);
  y += 10;
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text('IN WITNESS WHEREOF, the parties have executed this agreement as of the date written above.', 20, y, {maxWidth: 170});
  y += 14;
  const sx = 20;
  parties.forEach((p, i) => {
    const x = i === 0 ? sx : 115;
    if (i === 2) { y += 16; }
    H.sigLine(doc, fill(p, d) + ' — Signature', i < 2 ? x : sx, i < 2 ? y : y);
    H.sigLine(doc, 'Date', i < 2 ? x : sx, (i < 2 ? y : y) + 12);
  });
  H.disclaimer(doc);
}

const TEMPLATES = [
  /* ── BUSINESS ── */
  {
    id:'invoice', name:'Invoice', cat:'Business',
    desc:'Professional invoice for billing clients',
    fields:[
      {type:'heading',label:'From'},
      {id:'fromName',label:'Your Name / Company'},{id:'fromAddress',label:'Address'},{id:'fromEmail',label:'Email',ph:'email@example.com'},{id:'fromPhone',label:'Phone',ph:'(555) 123-4567'},

/* ── Download Utilities ── */
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function downloadBlob(content, filename, mimeType) {
  const blob = new Blob(['\ufeff', content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

const filenameInput = document.getElementById('filenameInput');

function makeSlug(tmpl, data) {
  const name = data.name || data.fromName || data.yourName || data.personName || '';
  const suffix = name ? '_' + name.replace(/\s+/g, '_') : '';
  return tmpl.name.replace(/\s+/g, '_') + suffix;
}

function getFilename(tmpl, data) {
  const custom = filenameInput.value.trim();
  if (custom) return custom;
  return makeSlug(tmpl, data);
}

function updateFilenamePreview() {
  const tmpl = getTemplate(templateSelect.value);
  if (!tmpl) return;
  const data = getData(tmpl);
  filenameInput.value = makeSlug(tmpl, data);
}

function getFieldLabel(tmpl, fieldId) {
  const f = tmpl.fields.find(x => x.id === fieldId);
  return f ? f.label : fieldId;
}

/* ── HTML Document Generator (for Word downloads) ── */
function htmlCSS() {
  let c = '<style>';
  c += 'body{font-family:Calibri,Arial,sans-serif;max-width:700px;margin:40px auto;padding:0 20px;color:#000;line-height:1.5;font-size:10pt}';
  c += 'h1{text-align:center;font-size:20pt;font-weight:bold;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:16px;letter-spacing:1px}';
  c += 'h3{font-size:12pt;font-weight:bold;color:#000;padding-bottom:3px;margin:16px 0 6px}';
  c += 'table{width:100%;border-collapse:collapse;margin:10px 0}';
  c += 'th,td{border:1px solid #bbb;padding:6px 8px;text-align:left;font-size:9pt}';
  c += 'th{background:#f0f0f0;font-size:8pt;font-weight:bold}';
  c += 'p{margin:4px 0;font-size:10pt}';
  c += '.sig{border-top:1px solid #000;width:250px;margin-top:40px;padding-top:4px;font-size:8pt;color:#505050}';
  c += '.small{font-size:9pt;color:#000}';
  c += '.right{text-align:right}';
  c += '.bold{font-weight:bold}';
  c += '.total{text-align:right;font-weight:bold;font-size:12pt;margin:8px 0}';
  c += '.sep{border:none;border-top:1px solid #c8c8c8;margin:10px 0}';
  c += '.bf{margin:10px 0 14px}';
  c += '.bf-line{border-bottom:1px solid #000;width:100%;height:18px}';
  c += '.bf-label{font-size:8pt;color:#888;margin-top:2px}';
  c += '.ib{display:inline-block;border-bottom:1px solid #000;min-width:120px;padding:0 8px}';
  c += '.il{font-size:7pt;color:#888}';
  c += '</style>';
  return c;
}

function generateHTML(tmpl, data, blank) {
  const d = blank ? {} : data;
  let h = '<!DOCTYPE html><html><head><meta charset="utf-8">' + htmlCSS() + '</head><body>';

  const lk = LEGAL[tmpl.id] ? tmpl.id : null;
  if (lk) {
    h += '<h1>' + escHtml(tmpl.name.toUpperCase()) + '</h1>';
    h += htmlLegal(tmpl, d, lk, blank);
  } else if (tmpl.id === 'invoice') {
    h += htmlInvoice(d, blank);
  } else if (tmpl.id === 'receipt') {
    h += htmlReceipt(d, blank);
  } else if (tmpl.id === 'resume') {
    h += htmlResume(d, blank);
  } else if (tmpl.id === 'movingChecklist') {
    h += '<h1>' + escHtml(tmpl.name.toUpperCase()) + '</h1>';
    h += htmlFields(tmpl, d, blank);
    h += htmlChecklist();
  } else {
    h += '<h1>' + escHtml(tmpl.name.toUpperCase()) + '</h1>';
    h += htmlFields(tmpl, d, blank);
    if (tmpl.id === 'budget' && !blank) h += htmlBudgetSummary(d);
  }

  h += '</body></html>';
  return h;
}

/* Custom Invoice HTML — mirrors PDF layout */
function htmlInvoice(d, blank) {
  const v = (id) => d[id] || '';
  let h = '';
  h += '<table style="border:none;margin-bottom:10px"><tr style="vertical-align:top"><td style="border:none;width:60%">';
  if (blank) {
    h += htmlBlankField('Your Name / Company') + htmlBlankField('Address') + htmlBlankField('Email') + htmlBlankField('Phone');
  } else {
    if (v('fromName')) h += '<p class="bold" style="font-size:10pt">' + escHtml(v('fromName')) + '</p>';
    if (v('fromAddress')) h += '<p style="font-size:9pt">' + escHtml(v('fromAddress')) + '</p>';
    if (v('fromEmail')) h += '<p style="font-size:9pt">' + escHtml(v('fromEmail')) + '</p>';
    if (v('fromPhone')) h += '<p style="font-size:9pt">' + escHtml(v('fromPhone')) + '</p>';
  }
  h += '</td><td style="border:none;text-align:right">';
  h += '<p style="font-size:24pt;font-weight:bold;margin:0;letter-spacing:2px">INVOICE</p>';
  if (blank) {
    h += htmlBlankField('Invoice #') + htmlBlankField('Date') + htmlBlankField('Due Date');
  } else {
    h += '<p style="font-size:9pt">Invoice #: ' + escHtml(v('invoiceNum') || '___') + '</p>';
    h += '<p style="font-size:9pt">Date: ' + escHtml(v('date') || H.today()) + '</p>';
    if (v('dueDate')) h += '<p style="font-size:9pt">Due: ' + escHtml(v('dueDate')) + '</p>';
  }
  h += '</td></tr></table>';
  h += '<hr class="sep">';
  h += '<p style="font-size:9pt;font-weight:bold;color:#646464;text-transform:uppercase;letter-spacing:0.5px">Bill To</p>';
  if (blank) {
    h += htmlBlankField('Client Name') + htmlBlankField('Client Address');
  } else {
    if (v('toName')) h += '<p class="bold">' + escHtml(v('toName')) + '</p>';
    if (v('toAddress')) h += '<p>' + escHtml(v('toAddress')) + '</p>';
  }
  h += '<hr class="sep">';
  // Items table
  h += '<table><tr style="background:#f0f0f0"><th style="width:50%">Description</th><th style="width:12%">Qty</th><th style="width:18%">Rate</th><th style="width:20%">Amount</th></tr>';
  if (blank) {
    for (let r = 0; r < 5; r++) h += '<tr><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>';
  } else {
    (d.items||[]).forEach(item => {
      if (!item.col0) return;
      const qty = parseFloat(item.col1)||0, rate = parseFloat(item.col2)||0;
      h += '<tr><td>' + escHtml(item.col0) + '</td><td>' + qty + '</td><td>$' + rate.toFixed(2) + '</td><td>$' + (qty*rate).toFixed(2) + '</td></tr>';
    });
  }
  h += '</table>';
  if (!blank) {
    let sub = 0;
    (d.items||[]).forEach(i => { if(i.col0) sub += (parseFloat(i.col1)||0)*(parseFloat(i.col2)||0); });
    const tax = sub * (parseFloat(d.taxRate)||0) / 100;
    h += '<p class="right">Subtotal: $' + sub.toFixed(2) + '</p>';
    if (tax > 0) h += '<p class="right">Tax: $' + tax.toFixed(2) + '</p>';
    h += '<p class="total">TOTAL: $' + (sub+tax).toFixed(2) + '</p>';
  }
  if (!blank && v('notes')) {
    h += '<h3>Notes</h3><p>' + escHtml(v('notes')).replace(/\n/g,'<br>') + '</p>';
  }
  return h;
}

  }
  h += '<table style="border:none;margin:8px 0"><tr style="vertical-align:top"><td style="border:none">';
  if (blank) { h += htmlBlankField('Receipt #'); } else { h += '<p style="font-size:9pt">Receipt #: ' + escHtml(v('receiptNum')||'___') + '</p>'; }
  h += '</td><td style="border:none;text-align:right">';
  if (blank) { h += htmlBlankField('Date'); } else { h += '<p style="font-size:9pt">Date: ' + escHtml(v('date')||H.today()) + '</p>'; }
  h += '</td></tr></table>';
  h += '<hr class="sep">';
  h += '<table><tr style="background:#f0f0f0"><th style="width:70%">Description</th><th style="width:30%">Amount</th></tr>';
  if (blank) {
    for (let r = 0; r < 5; r++) h += '<tr><td>&nbsp;</td><td>&nbsp;</td></tr>';
  } else {
    (d.items||[]).forEach(item => {
      if (!item.col0) return;
      const amt = parseFloat(item.col1)||0;
      h += '<tr><td>' + escHtml(item.col0) + '</td><td>$' + amt.toFixed(2) + '</td></tr>';
    });
  }
  h += '</table>';
  if (!blank) {
    let total = 0;
    (d.items||[]).forEach(i => { if(i.col0) total += parseFloat(i.col1)||0; });
    h += '<p class="total">TOTAL: $' + total.toFixed(2) + '</p>';
    if (v('payMethod')) h += '<p style="font-size:9pt">Payment Method: ' + escHtml(v('payMethod')) + '</p>';
    if (v('notes')) { h += '<h3>Notes</h3><p>' + escHtml(v('notes')).replace(/\n/g,'<br>') + '</p>'; }
  }
  return h;
}

/* Custom Resume HTML — mirrors PDF layout */
function htmlResume(d, blank) {
  const v = (id) => d[id] || '';
  let h = '';
  if (blank) {
    h += '<div style="text-align:center;margin-bottom:10px">';
    h += htmlBlankField('Full Name');
    h += '<p class="small">';
    h += htmlBlankField('Email') + htmlBlankField('Phone') + htmlBlankField('City, State');
    h += '</p></div>';
  } else {
    h += '<p style="text-align:center;font-size:22pt;font-weight:bold;margin:0">' + escHtml(v('name') || 'Your Name') + '</p>';
    const contact = [v('email'),v('phone'),v('location'),v('linkedin')].filter(Boolean).join('  |  ');
    if (contact) h += '<p style="text-align:center;font-size:9pt">' + escHtml(contact) + '</p>';
  }
  h += '<hr class="sep">';
  if (blank || v('summary')) {
    h += '<h3>Professional Summary</h3>';
    if (blank) h += htmlBlankField('Professional Summary');
    else h += '<p>' + escHtml(v('summary')) + '</p>';
  }
  // Experience
  const exps = blank ? [[1],[2],[3]] : [[v('e1Title'),v('e1Company'),v('e1Dates'),v('e1Desc')],[v('e2Title'),v('e2Company'),v('e2Dates'),v('e2Desc')],[v('e3Title'),v('e3Company'),v('e3Dates'),v('e3Desc')]].filter(e => e[0]);
  if (exps.length) {
    h += '<h3>Experience</h3>';
    if (blank) {
      for (let i = 0; i < 2; i++) {
        h += htmlBlankField('Job Title') + htmlBlankField('Company') + htmlBlankField('Dates') + htmlBlankField('Description');
        h += '<hr class="sep" style="border-top:1px dashed #ddd">';
      }
    } else {
      exps.forEach(([title,co,dates,desc]) => {
        h += '<table style="border:none;margin:4px 0"><tr><td style="border:none"><p class="bold" style="font-size:10pt">' + escHtml(title) + '</p></td><td style="border:none;text-align:right;font-size:10pt">' + escHtml(dates||'') + '</td></tr></table>';
        if (co) h += '<p style="font-style:italic;font-size:10pt">' + escHtml(co) + '</p>';
        if (desc) {
          desc.split('\n').forEach(line => {
            if (line.trim()) h += '<p style="margin-left:16px">\u2022 ' + escHtml(line.trim()) + '</p>';
          });
        }
      });
    }
  }
  // Education
  if (blank || v('ed1Degree')) {
    h += '<h3>Education</h3>';
    if (blank) {
      h += htmlBlankField('Degree') + htmlBlankField('School') + htmlBlankField('Year');
    } else {
      [[v('ed1Degree'),v('ed1School'),v('ed1Year')],[v('ed2Degree'),v('ed2School'),v('ed2Year2')]].forEach(([deg,sch,yr]) => {
        if (!deg) return;
        h += '<table style="border:none;margin:2px 0"><tr><td style="border:none"><p class="bold" style="font-size:10pt">' + escHtml(deg) + '</p></td><td style="border:none;text-align:right;font-size:10pt">' + escHtml(yr||'') + '</td></tr></table>';
        if (sch) h += '<p style="font-style:italic;font-size:10pt">' + escHtml(sch) + '</p>';
      });
    }
  }
  // Skills
  if (blank || v('skills')) {
    h += '<h3>Skills</h3>';
    if (blank) h += htmlBlankField('Skills');
    else h += '<p>' + escHtml(v('skills')) + '</p>';
  }
  return h;
}

function htmlBlankField(label) {
  return '<div class="bf"><div class="bf-line"></div><div class="bf-label">' + escHtml(label) + '</div></div>';
}

function htmlFields(tmpl, d, blank) {
  let h = '';
  tmpl.fields.forEach(f => {
    if (f.type === 'heading') { h += '<h3>' + escHtml(f.label) + '</h3>'; return; }
    if (f.type === 'items') { h += htmlItemsTable(f, d, blank, tmpl.id); return; }
    if (blank) { h += htmlBlankField(f.label); return; }
    const val = d[f.id] || '';
    if (!val) return;
    if (f.type === 'textarea') {
      h += '<p><strong>' + escHtml(f.label) + ':</strong></p><p>' + escHtml(val).replace(/\n/g, '<br>') + '</p>';
    } else {
      h += '<p><strong>' + escHtml(f.label) + ':</strong> ' + escHtml(val) + '</p>';
    }
  });
  return h;
}

function htmlItemsTable(f, d, blank, tmplId) {
  let h = '<h3>' + escHtml(f.label) + '</h3><table><tr>';
  f.cols.forEach(c => { h += '<th>' + escHtml(c) + '</th>'; });
  if (tmplId === 'invoice') h += '<th>Amount</th>';
  h += '</tr>';
  if (blank) {
    for (let r = 0; r < (f.rows || 5); r++) {
      h += '<tr>';
      for (let c = 0; c < f.cols.length; c++) h += '<td>&nbsp;</td>';
      if (tmplId === 'invoice') h += '<td>&nbsp;</td>';
      h += '</tr>';
    }
  } else {
    (d[f.id] || []).forEach(item => {
      if (!item.col0) return;
      h += '<tr><td>' + escHtml(item.col0) + '</td>';
      if (tmplId === 'invoice') {
        const qty = parseFloat(item.col1)||0, rate = parseFloat(item.col2)||0;
        h += '<td>' + qty + '</td><td>$' + rate.toFixed(2) + '</td><td>$' + (qty*rate).toFixed(2) + '</td>';
      } else {
        for (let c = 1; c < f.cols.length; c++) {
          const v = item['col'+c]||'';
          const n = parseFloat(v);
          h += '<td>' + (isNaN(n) ? escHtml(v) : '$'+n.toFixed(2)) + '</td>';
        }
      }
      h += '</tr>';
    });
  }
  return h + '</table>';
}


function htmlBudgetSummary(d) {
  let totalInc = 0, totalExp = 0;
  [[d.inc1Src,d.inc1Amt],[d.inc2Src,d.inc2Amt],[d.inc3Src,d.inc3Amt]].forEach(([s,a]) => { if(s||a) totalInc += parseFloat(a)||0; });
  [d.expHousing,d.expUtilities,d.expFood,d.expTransport,d.expInsurance,d.expHealth,d.expEntertain,d.expSavings,d.expDebt,d.expOther].forEach(a => { totalExp += parseFloat(a)||0; });
  const rem = totalInc - totalExp;
  let h = '<h3>Summary</h3>';
  h += '<p>Total Income: <strong>$' + totalInc.toFixed(2) + '</strong></p>';
  h += '<p>Total Expenses: <strong>$' + totalExp.toFixed(2) + '</strong></p>';
  h += '<p style="font-weight:bold;font-size:16px;color:' + (rem>=0?'#008000':'#cc0000') + '">Remaining: $' + rem.toFixed(2) + '</p>';
  return h;
}

function htmlChecklist() {
  let h = '';
  Object.entries(CHECKLISTS).forEach(([section, items]) => {
    h += '<h3>' + escHtml(section) + '</h3>';
    items.forEach(item => { h += '<p>\u2610 ' + escHtml(item) + '</p>'; });
  });
  return h;
}

function htmlLegal(tmpl, d, lk, blank) {
  const legal = LEGAL[lk];
  const fillHtml = (text) => {
    if (blank) {
      return text.replace(/\{\{(\w+)\}\}/g, (_, k) => {
        const label = getFieldLabel(tmpl, k);
        return '<span class="ib">&nbsp;</span> <span class="il">(' + escHtml(label) + ')</span>';
      });
    }
    return escHtml(fill(text, d));
  };

  let h = '';
  if (legal.intro) h += '<p>' + fillHtml(legal.intro) + '</p>';
  legal.sections.forEach((s, i) => {
    h += '<h3>' + (i+1) + '. ' + escHtml(s.t) + '</h3>';
    h += '<p>' + fillHtml(s.b) + '</p>';
  });
  h += '<p style="margin-top:20px;font-size:10pt">IN WITNESS WHEREOF, the parties have executed this agreement as of the date written above.</p>';
  const parties = LEGAL_PARTIES[lk] || ['Party 1', 'Party 2'];
  h += '<div style="margin-top:30px">';
  parties.forEach(p => {
    h += '<div style="display:inline-block;width:45%;margin-right:5%;vertical-align:top"><div class="sig">' + escHtml(p) + ' \u2014 Signature</div><div class="sig" style="margin-top:15px">Date</div></div>';
  });
  h += '</div>';
  return h;
}

/* ── Plain Text Generator ── */
function generateText(tmpl, data, blank) {
  const d = blank ? {} : data;
  let t = tmpl.name.toUpperCase() + '\n' + '='.repeat(tmpl.name.length) + '\n\n';

  const lk = LEGAL[tmpl.id] ? tmpl.id : null;
  if (lk) {
    t += textLegal(tmpl, d, lk, blank);
  } else if (tmpl.id === 'movingChecklist') {
    t += textFields(tmpl, d, blank);
    t += textChecklist();
  } else {
    t += textFields(tmpl, d, blank);
    if (tmpl.id === 'invoice' && !blank) t += textInvoiceTotals(d);
    else if (tmpl.id === 'receipt' && !blank) t += textReceiptTotal(d);
    if (tmpl.id === 'budget' && !blank) t += textBudgetSummary(d);
  }

  t += '\n' + '-'.repeat(50) + '\nThis document is a general template for informational purposes only.\n';
  return t;
}

function textFields(tmpl, d, blank) {
  let t = '';
  tmpl.fields.forEach(f => {
    if (f.type === 'heading') { t += '\n' + f.label.toUpperCase() + '\n' + '-'.repeat(f.label.length) + '\n'; return; }
    if (f.type === 'items') { t += textItemsTable(f, d, blank, tmpl.id); return; }
    if (blank) { t += '\n' + '_'.repeat(40) + '\n' + f.label + '\n'; return; }
    const val = d[f.id] || '';
    if (!val) return;
    t += f.label + ': ' + val + '\n';
  });
  return t;
}

function textItemsTable(f, d, blank, tmplId) {
  let t = '\n';
  const cols = [...f.cols];
  if (tmplId === 'invoice') cols.push('Amount');
  t += cols.join(' | ') + '\n';
  t += cols.map(c => '-'.repeat(Math.max(c.length, 8))).join('-+-') + '\n';
  if (blank) {
    for (let r = 0; r < (f.rows || 5); r++) {
      t += cols.map(c => ' '.repeat(Math.max(c.length, 8))).join(' | ') + '\n';
    }
  } else {
    (d[f.id] || []).forEach(item => {
      if (!item.col0) return;
      if (tmplId === 'invoice') {
        const qty = parseFloat(item.col1)||0, rate = parseFloat(item.col2)||0;
        t += item.col0 + ' | ' + qty + ' | $' + rate.toFixed(2) + ' | $' + (qty*rate).toFixed(2) + '\n';
      } else {
        let row = item.col0;
        for (let c = 1; c < f.cols.length; c++) {
          const v = item['col'+c]||'';
          const n = parseFloat(v);
          row += ' | ' + (isNaN(n) ? v : '$'+n.toFixed(2));
        }
        t += row + '\n';
      }
    });
  }
  return t + '\n';
}

function textInvoiceTotals(d) {
  let sub = 0;
  (d.items||[]).forEach(i => { if(i.col0) sub += (parseFloat(i.col1)||0)*(parseFloat(i.col2)||0); });
  const tax = sub * (parseFloat(d.taxRate)||0) / 100;
  let t = '\nSubtotal: $' + sub.toFixed(2) + '\n';
  if (tax > 0) t += 'Tax: $' + tax.toFixed(2) + '\n';
  t += 'TOTAL: $' + (sub+tax).toFixed(2) + '\n';
  return t;
}

function textReceiptTotal(d) {
  let total = 0;
  (d.items||[]).forEach(i => { if(i.col0) total += parseFloat(i.col1)||0; });
  return '\nTOTAL: $' + total.toFixed(2) + '\n';
}

function textBudgetSummary(d) {
  let totalInc = 0, totalExp = 0;
  [[d.inc1Src,d.inc1Amt],[d.inc2Src,d.inc2Amt],[d.inc3Src,d.inc3Amt]].forEach(([s,a]) => { if(s||a) totalInc += parseFloat(a)||0; });
  [d.expHousing,d.expUtilities,d.expFood,d.expTransport,d.expInsurance,d.expHealth,d.expEntertain,d.expSavings,d.expDebt,d.expOther].forEach(a => { totalExp += parseFloat(a)||0; });
  const rem = totalInc - totalExp;
  return '\nSUMMARY\n-------\nTotal Income: $' + totalInc.toFixed(2) + '\nTotal Expenses: $' + totalExp.toFixed(2) + '\nRemaining: $' + rem.toFixed(2) + '\n';
}

function textChecklist() {
  let t = '';
  Object.entries(CHECKLISTS).forEach(([section, items]) => {
    t += '\n' + section.toUpperCase() + '\n' + '-'.repeat(section.length) + '\n';
    items.forEach(item => { t += '[ ] ' + item + '\n'; });
  });
  return t;
}

function textLegal(tmpl, d, lk, blank) {
  const legal = LEGAL[lk];
  const fillTxt = (text) => {
    if (blank) {
      return text.replace(/\{\{(\w+)\}\}/g, (_, k) => {
        const label = getFieldLabel(tmpl, k);
        return '______________________ (' + label + ')';
      });
    }
    return fill(text, d);
  };
  let t = '';
  if (legal.intro) t += fillTxt(legal.intro) + '\n\n';
  legal.sections.forEach((s, i) => {
    t += (i+1) + '. ' + s.t + '\n';
    t += fillTxt(s.b) + '\n\n';
  });
  t += 'IN WITNESS WHEREOF, the parties have executed this agreement as of the date written above.\n\n';
  const parties = LEGAL_PARTIES[lk] || ['Party 1', 'Party 2'];
  parties.forEach(p => {
    t += '\n' + '_'.repeat(30) + '\n' + p + ' \u2014 Signature\n\n' + '_'.repeat(30) + '\nDate\n';
  });
  return t;
}

/* ── Download Functions ── */
function downloadWord() {
  const tmpl = getTemplate(templateSelect.value);
  if (!tmpl) return;
  const data = getData(tmpl);
  downloadBlob(generateHTML(tmpl, data, false), getFilename(tmpl, data) + '.doc', 'application/msword');
}

function downloadText() {
  const tmpl = getTemplate(templateSelect.value);
  if (!tmpl) return;
  const data = getData(tmpl);
  downloadBlob(generateText(tmpl, data, false), getFilename(tmpl, data) + '.txt', 'text/plain;charset=utf-8');
}

function downloadBlank() {
  const tmpl = getTemplate(templateSelect.value);
  if (!tmpl) return;
  downloadBlob(generateHTML(tmpl, {}, true), tmpl.name.replace(/\s+/g, '_') + '_Blank.doc', 'application/msword');
}

/* ── UI Logic ── */
const templateSelect = document.getElementById('templateSelect');
const templateDesc = document.getElementById('templateDesc');
const templateForm = document.getElementById('templateForm');

function populateSelector() {
  const cats = {};
  TEMPLATES.forEach(t => { (cats[t.cat] = cats[t.cat] || []).push(t); });
  Object.entries(cats).forEach(([cat, templates]) => {
    const grp = document.createElement('optgroup');
    grp.label = cat;
    templates.forEach(t => grp.appendChild(new Option(t.name, t.id)));
    templateSelect.appendChild(grp);
  });
}

function getTemplate(id) { return TEMPLATES.find(t => t.id === id); }

function renderForm(tmpl) {
  templateForm.innerHTML = '';
  templateDesc.textContent = tmpl.desc;
  let rowDiv = null;
  tmpl.fields.forEach((f, i) => {
    if (f.type === 'heading') {
      rowDiv = null;
      const h = document.createElement('div');
      h.className = 'form-heading';
      h.textContent = f.label;
      templateForm.appendChild(h);
      return;
    }
    if (f.type === 'items') {
      rowDiv = null;
      renderItemsField(f);
      return;
    }
    const grp = document.createElement('div');
    grp.className = 'form-group';
    const lbl = document.createElement('label');
    lbl.className = 'form-label';
    lbl.textContent = f.label;
    lbl.htmlFor = 'field-' + f.id;
    grp.appendChild(lbl);

    let input;
    const ft = f.type || 'text';
    if (ft === 'textarea') {
      input = document.createElement('textarea');
      input.className = 'form-textarea';
      input.rows = 3;
    } else if (ft === 'select') {
      input = document.createElement('select');
      input.className = 'form-fselect';
      input.appendChild(new Option('-- Select --', ''));
      (f.options || []).forEach(o => input.appendChild(new Option(o, o)));
    } else {
      input = document.createElement('input');
      input.className = 'form-input';
      input.type = ft;
      if (ft === 'number') { input.min = '0'; input.step = 'any'; }
    }
    input.id = 'field-' + f.id;
    if (f.ph) input.placeholder = f.ph;
    grp.appendChild(input);

    if (f.half) {
      const next = tmpl.fields[i + 1];
      if (!rowDiv || !next || next.type === 'heading' || !next.half) {
        // Start a new row or just add standalone
        if (next && next.half && next.type !== 'heading') {
          rowDiv = document.createElement('div');
          rowDiv.className = 'form-row';
          rowDiv.appendChild(grp);
          templateForm.appendChild(rowDiv);
        } else {
          rowDiv = null;
          templateForm.appendChild(grp);
        }
      } else if (rowDiv) {
        rowDiv.appendChild(grp);
        rowDiv = null;
      }
    } else {
      rowDiv = null;
      templateForm.appendChild(grp);
    }
  });
}

function renderItemsField(f) {
  const section = document.createElement('div');
  section.className = 'items-section';
  const lbl = document.createElement('div');
  lbl.className = 'form-heading';
  lbl.textContent = f.label;
  section.appendChild(lbl);

  const table = document.createElement('div');
  table.className = 'items-table';
  table.id = 'items-' + f.id;

  const header = document.createElement('div');
  header.className = 'items-header';
  const widths = f.cols.length === 3 ? ['55%','15%','20%'] : ['70%','25%'];
  f.cols.forEach((col, ci) => {
    const s = document.createElement('span');
    s.textContent = col;
    s.style.width = widths[ci];
    header.appendChild(s);
  });
  table.appendChild(header);

  for (let r = 0; r < f.rows; r++) {
    const row = document.createElement('div');
    row.className = 'items-row';
    f.cols.forEach((col, ci) => {
      const inp = document.createElement('input');
      inp.type = ci === 0 ? 'text' : 'number';
      inp.style.width = widths[ci];
      inp.placeholder = ci === 0 ? 'Item ' + (r + 1) : '';
      inp.dataset.itemId = f.id;
      inp.dataset.row = r;
      inp.dataset.col = ci;
      if (ci > 0) { inp.min = '0'; inp.step = 'any'; }
      row.appendChild(inp);
    });
    table.appendChild(row);
  }
  section.appendChild(table);
  templateForm.appendChild(section);
}

function getData(tmpl) {
  const d = {};
  tmpl.fields.forEach(f => {
    if (f.type === 'heading') return;
    if (f.type === 'items') {
      const items = [];
      const table = document.getElementById('items-' + f.id);
      if (!table) return;
      table.querySelectorAll('.items-row').forEach(row => {
        const item = {};
        row.querySelectorAll('input').forEach(inp => { item['col' + inp.dataset.col] = inp.value; });
        items.push(item);
      });
      d[f.id] = items;
      return;
    }
    const el = document.getElementById('field-' + f.id);
    if (el) d[f.id] = el.value;
  });
  return d;
}

function generatePDF() {
  if (typeof jspdf === 'undefined') {
    alert('PDF library is still loading. Please try again in a moment.');
    return;
  }
  const tmpl = getTemplate(templateSelect.value);
  if (!tmpl) return;
  const data = getData(tmpl);
  const doc = new jspdf.jsPDF();
  tmpl.render(doc, data);
  doc.save(getFilename(tmpl, data) + '.pdf');
}

/* ── Events ── */
templateSelect.addEventListener('change', () => {
  const tmpl = getTemplate(templateSelect.value);
  if (tmpl) { renderForm(tmpl); updateFilenamePreview(); }
});

document.getElementById('downloadPdf').addEventListener('click', generatePDF);
document.getElementById('downloadWord').addEventListener('click', downloadWord);
document.getElementById('shareBtn').addEventListener('click', sharePDF);
document.getElementById('resetBtn').addEventListener('click', () => {
  const tmpl = getTemplate(templateSelect.value);
  if (tmpl) { renderForm(tmpl); updateFilenamePreview(); }
});

// Hide share button if Web Share API not supported
if (!navigator.canShare) document.getElementById('shareBtn').style.display = 'none';

async function sharePDF() {
  if (typeof jspdf === 'undefined') {
    alert('PDF library is still loading. Please try again in a moment.');
    return;
  }
  const tmpl = getTemplate(templateSelect.value);
  if (!tmpl) return;
  const data = getData(tmpl);
  const doc = new jspdf.jsPDF();
  tmpl.render(doc, data);
  const filename = getFilename(tmpl, data) + '.pdf';
  const blob = doc.output('blob');
  const file = new File([blob], filename, { type: 'application/pdf' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: filename });
    } catch (err) {
      if (err.name !== 'AbortError') doc.save(filename);
    }
  } else {
    doc.save(filename);
  }
}

// Update filename preview when form fields change
templateForm.addEventListener('input', updateFilenamePreview);

/* ── Init ── */
populateSelector();
const urlT = new URLSearchParams(location.search).get('t');
const initial = (urlT && getTemplate(urlT)) || TEMPLATES[0];
if (initial) { templateSelect.value = initial.id; renderForm(initial); updateFilenamePreview(); }
</script>
