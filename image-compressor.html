<style>
  .game-page { padding-bottom: 32px; }

  .drop-icon {

  .drop-privacy {

  /* Settings panel */
  .settings-panel {
    width: 100%;

    border-radius: var(--radius-lg);
    padding: 16px;

  }
  .settings-panel.visible { display: flex; }

  .setting-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .setting-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
  }
  .setting-row-inner {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .quality-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: var(--btn-bg);
    outline: none;
  }
  .quality-slider::-webkit-slider-thumb {
    -webkit-appearance: none;

    cursor: pointer;
    border: 2px solid var(--card);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .quality-slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;

  .quality-value {

  .resize-row {

  /* Summary bar */

  /* Action buttons */
  .action-btn {
    width: 100%;

  .action-btn:disabled {

  .action-btn.secondary {

  .action-btn.secondary:hover:not(:disabled) {
    background: var(--btn-hover);

  .btn-row {
    width: 100%;

    gap: 8px;

  .btn-row .action-btn { flex: 1; }
  .share-btn {
    width: 48px; min-width: 48px; padding: 0; border: 1px solid var(--card-border);
    border-radius: var(--radius-md); background: var(--btn-bg); color: var(--text);

  .share-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .share-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* Status messages */
  .status-msg {
    width: 100%;

  .spinner {
    display: inline-block;

    border: 2px solid currentColor;

  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 400px) {
    .tool-content { padding: 0 12px; }

  }
</style>

<script src="theme.js"></script>
<script>
// === State ===
var images = []; // [{id, name, size, type, origUrl, compUrl, compBlob, compSize, width, height, status:'pending'|'compressing'|'done'|'error'}]
var idCounter = 0;
var processing = false;
var outputFormat = 'auto';
var quality = 75;

// === DOM refs ===
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var dropText = document.getElementById('dropText');
var statusMsg = document.getElementById('statusMsg');
var settingsPanel = document.getElementById('settingsPanel');
var qualitySlider = document.getElementById('qualitySlider');
var qualityValue = document.getElementById('qualityValue');
var maxWidthInput = document.getElementById('maxWidth');
var maxHeightInput = document.getElementById('maxHeight');
var imageList = document.getElementById('imageList');
var summaryBar = document.getElementById('summaryBar');
var summaryText = document.getElementById('summaryText');
var clearAllBtn = document.getElementById('clearAllBtn');
var compressBtn = document.getElementById('compressBtn');
var downloadRow = document.getElementById('downloadRow');
var downloadAllBtn = document.getElementById('downloadAllBtn');
var shareBtn = document.getElementById('shareBtn');
var addMoreBtn = document.getElementById('addMoreBtn');
if (!navigator.canShare) shareBtn.style.display = 'none';

// === Utilities ===
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function escapeHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showStatus(text, type) {
  statusMsg.className = 'status-msg visible ' + type;
  statusMsg.innerHTML = '';
  if (type === 'loading') {
    var s = document.createElement('span');
    s.className = 'spinner';
    statusMsg.appendChild(s);
  }
  statusMsg.appendChild(document.createTextNode(text));
}

function hideStatus() {
  statusMsg.className = 'status-msg';
  statusMsg.innerHTML = '';
}

function isImageFile(file) {
  return /^image\/(jpeg|png|webp)$/.test(file.type);
}

function hasFiles(dt) {
  return Array.prototype.indexOf.call(dt.types, 'Files') !== -1;
}

function getMimeForFormat(format, origType) {
  if (format === 'jpeg') return 'image/jpeg';
  if (format === 'png') return 'image/png';
  if (format === 'webp') return 'image/webp';
  // auto: keep original, but fallback to jpeg for unknown
  if (origType === 'image/png') return 'image/png';
  if (origType === 'image/webp') return 'image/webp';
  return 'image/jpeg';
}

function getExtForMime(mime) {
  if (mime === 'image/png') return '.png';
  if (mime === 'image/webp') return '.webp';
  return '.jpg';
}

function calcSavings(orig, comp) {
  if (orig === 0) return 0;
  return Math.round((1 - comp / orig) * 100);
}

// === Quality slider ===
qualitySlider.addEventListener('input', function() {
  quality = parseInt(qualitySlider.value, 10);
  qualityValue.textContent = quality + '%';
});

// === Format buttons ===
document.getElementById('formatBtns').addEventListener('click', function(e) {
  var btn = e.target.closest('.format-btn');
  if (!btn) return;
  document.querySelectorAll('.format-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  outputFormat = btn.dataset.format;
});

// === Drop zone events ===
dropZone.addEventListener('click', function() {
  if (!processing) fileInput.click();
});

dropZone.addEventListener('dragover', function(e) {
  if (!hasFiles(e.dataTransfer)) return;
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', function(e) {
  if (!dropZone.contains(e.relatedTarget)) {
    dropZone.classList.remove('dragover');
  }
});

dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (processing) return;
  if (!hasFiles(e.dataTransfer)) return;
  var files = [];
  for (var i = 0; i < e.dataTransfer.files.length; i++) {
    if (isImageFile(e.dataTransfer.files[i])) files.push(e.dataTransfer.files[i]);
  }
  if (files.length === 0) {
    showStatus('Please drop JPEG, PNG, or WebP images only.', 'error');
    return;
  }
  addFiles(files);
});

fileInput.addEventListener('change', function() {
  if (fileInput.files.length > 0) {
    var files = [];
    for (var i = 0; i < fileInput.files.length; i++) files.push(fileInput.files[i]);
    addFiles(files);
  }
  fileInput.value = '';
});

addMoreBtn.addEventListener('click', function() {
  fileInput.click();
});

// === Add files ===
function addFiles(files) {
  hideStatus();
  var skipped = 0;
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    if (!isImageFile(file)) { skipped++; continue; }
    var url = URL.createObjectURL(file);
    images.push({
      id: ++idCounter,
      name: file.name,
      size: file.size,
      type: file.type,
      file: file,
      origUrl: url,
      compUrl: null,
      compBlob: null,
      compSize: 0,
      width: 0,
      height: 0,
      status: 'pending'
    });
  }
  if (skipped > 0) {
    showStatus(skipped + ' file' + (skipped > 1 ? 's' : '') + ' skipped (unsupported format).', 'error');
  }
  updateUI();
}

// === Render ===
function updateUI() {
  // Settings panel
  settingsPanel.className = images.length > 0 ? 'settings-panel visible' : 'settings-panel';

  // Drop text
  dropText.textContent = images.length > 0 ? 'Drop more images here' : 'Drop images here';

  // Summary bar
  if (images.length > 0) {
    var totalOrig = images.reduce(function(s, img) { return s + img.size; }, 0);
    var doneCount = images.filter(function(img) { return img.status === 'done'; }).length;
    var txt = images.length + ' image' + (images.length !== 1 ? 's' : '');
    if (doneCount > 0) {
      var totalComp = images.reduce(function(s, img) { return s + (img.compSize || img.size); }, 0);
      var saved = calcSavings(totalOrig, totalComp);
      txt += ' \u2022 ' + formatSize(totalOrig) + ' \u2192 ' + formatSize(totalComp) + ' (' + saved + '% saved)';
    } else {
      txt += ' \u2022 ' + formatSize(totalOrig);
    }
    summaryText.textContent = txt;
    summaryBar.style.display = 'flex';
  } else {
    summaryBar.style.display = 'none';
  }

  // Buttons
  var hasPending = images.some(function(img) { return img.status === 'pending'; });
  var hasDone = images.some(function(img) { return img.status === 'done'; });
  compressBtn.disabled = !hasPending || processing;
  compressBtn.style.display = hasPending ? 'flex' : 'none';
  downloadRow.style.display = hasDone ? 'flex' : 'none';

  renderImageList();
}

function renderImageList() {
  imageList.innerHTML = '';

  images.forEach(function(img) {
    var item = document.createElement('div');
    item.className = 'image-item';
    item.dataset.id = img.id;

    // Top row
    var top = document.createElement('div');
    top.className = 'image-item-top';

    // Thumbnail
    var thumb = document.createElement('img');
    thumb.className = 'image-thumb';
    thumb.src = img.compUrl || img.origUrl;
    thumb.alt = '';
    top.appendChild(thumb);

    // Info
    var info = document.createElement('div');
    info.className = 'image-item-info';

    var nameEl = document.createElement('div');
    nameEl.className = 'image-item-name';
    nameEl.textContent = img.name;
    info.appendChild(nameEl);

    var meta = document.createElement('div');
    meta.className = 'image-item-meta';

    if (img.status === 'done') {
      var savings = calcSavings(img.size, img.compSize);
      meta.innerHTML =
        '<span class="size-badge original">' + formatSize(img.size) + '</span>' +
        '<span class="size-arrow">\u2192</span>' +
        '<span class="size-badge compressed">' + formatSize(img.compSize) + '</span>' +
        '<span class="savings-badge' + (savings < 0 ? ' increase' : '') + '">' +
          (savings > 0 ? '\u2212' + savings + '%' : savings === 0 ? '0%' : '+' + Math.abs(savings) + '%') +
        '</span>';
    } else if (img.status === 'error') {
      meta.innerHTML = '<span style="color:#ff3355">Compression failed</span>';
    } else if (img.status === 'compressing') {
      meta.innerHTML = '<span style="color:var(--accent)">Compressing\u2026</span>';
    } else {
      var dims = img.width && img.height ? img.width + '\u00D7' + img.height + ' \u2022 ' : '';
      meta.textContent = dims + formatSize(img.size);
    }
    info.appendChild(meta);
    top.appendChild(info);

    // Actions
    var actions = document.createElement('div');
    actions.className = 'image-item-actions';

    if (img.status === 'done') {
      var dlBtn = document.createElement('button');
      dlBtn.className = 'img-act-btn';
      dlBtn.title = 'Download';
      dlBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
      dlBtn.addEventListener('click', function() { downloadSingle(img); });
      actions.appendChild(dlBtn);
    }

    var removeBtn = document.createElement('button');
    removeBtn.className = 'img-act-btn remove';
    removeBtn.title = 'Remove';
    removeBtn.innerHTML = '&#x2715;';
    removeBtn.disabled = processing;
    removeBtn.addEventListener('click', function() {
      if (processing) return;
      removeImage(img.id);
    });
    actions.appendChild(removeBtn);

    top.appendChild(actions);
    item.appendChild(top);

    // Progress bar
    var prog = document.createElement('div');
    prog.className = 'image-progress';
    var bar = document.createElement('div');
    bar.className = 'image-progress-bar';
    if (img.status === 'done') {
      prog.classList.add('done');
      bar.style.width = '100%';
    } else if (img.status === 'error') {
      prog.classList.add('error');
      bar.style.width = '100%';
    } else if (img.status === 'compressing') {
      bar.style.width = '50%';
    }
    prog.appendChild(bar);
    item.appendChild(prog);

    imageList.appendChild(item);
  });
}

function removeImage(id) {
  var idx = images.findIndex(function(img) { return img.id === id; });
  if (idx === -1) return;
  var img = images[idx];
  if (img.origUrl) URL.revokeObjectURL(img.origUrl);
  if (img.compUrl) URL.revokeObjectURL(img.compUrl);
  images.splice(idx, 1);
  hideStatus();
  updateUI();
}

clearAllBtn.addEventListener('click', function() {
  if (processing) return;
  images.forEach(function(img) {
    if (img.origUrl) URL.revokeObjectURL(img.origUrl);
    if (img.compUrl) URL.revokeObjectURL(img.compUrl);
  });
  images = [];
  hideStatus();
  updateUI();
});

// === Compress ===
compressBtn.addEventListener('click', function() {
  if (processing) return;
  compressAll();
});

async function compressAll() {
  processing = true;
  compressBtn.disabled = true;

  var toProcess = images.filter(function(img) { return img.status === 'pending'; });
  showStatus('Compressing ' + toProcess.length + ' image' + (toProcess.length !== 1 ? 's' : '') + '\u2026', 'loading');

  var maxW = parseInt(maxWidthInput.value, 10) || 0;
  var maxH = parseInt(maxHeightInput.value, 10) || 0;
  var q = quality / 100;

  for (var i = 0; i < toProcess.length; i++) {
    var img = toProcess[i];
    img.status = 'compressing';
    updateUI();

    try {
      var result = await compressImage(img.file, img.type, q, maxW, maxH);
      img.compBlob = result.blob;
      img.compSize = result.blob.size;
      img.width = result.origWidth;
      img.height = result.origHeight;
      if (img.compUrl) URL.revokeObjectURL(img.compUrl);
      img.compUrl = URL.createObjectURL(result.blob);
      img.status = 'done';
    } catch (err) {
      img.status = 'error';
    }
    updateUI();
  }

  processing = false;

  var doneCount = images.filter(function(img) { return img.status === 'done'; }).length;
  var errorCount = images.filter(function(img) { return img.status === 'error'; }).length;
  if (errorCount > 0) {
    showStatus(doneCount + ' compressed, ' + errorCount + ' failed.', 'error');
  } else {
    var totalOrig = images.reduce(function(s, img) { return s + img.size; }, 0);
    var totalComp = images.reduce(function(s, img) { return s + (img.compSize || img.size); }, 0);
    var saved = calcSavings(totalOrig, totalComp);
    showStatus('Done! Saved ' + saved + '% (' + formatSize(totalOrig - totalComp) + ' reduced).', 'success');
  }
  updateUI();
}

function compressImage(file, origType, q, maxW, maxH) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() {
      var imgEl = new Image();
      imgEl.onload = function() {
        var w = imgEl.naturalWidth;
        var h = imgEl.naturalHeight;
        var origW = w;
        var origH = h;

        // Resize if max dimensions set
        if (maxW > 0 && w > maxW) {
          h = Math.round(h * (maxW / w));
          w = maxW;
        }
        if (maxH > 0 && h > maxH) {
          w = Math.round(w * (maxH / h));
          h = maxH;
        }

        var canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(imgEl, 0, 0, w, h);

        var mime = getMimeForFormat(outputFormat, origType);
        // PNG doesn't use quality param
        var useQuality = mime !== 'image/png' ? q : undefined;

        canvas.toBlob(function(blob) {
          if (!blob) { reject(new Error('Compression failed')); return; }
          resolve({ blob: blob, origWidth: origW, origHeight: origH });
        }, mime, useQuality);
      };
      imgEl.onerror = function() { reject(new Error('Failed to load image')); };
      imgEl.src = reader.result;
    };
    reader.onerror = function() { reject(new Error('Failed to read file')); };
    reader.readAsDataURL(file);
  });
}

// === Download ===
function downloadSingle(img) {
  if (!img.compBlob) return;
  var mime = img.compBlob.type;
  var ext = getExtForMime(mime);
  var baseName = img.name.replace(/\.[^.]+$/, '');
  var a = document.createElement('a');
  a.href = img.compUrl;
  a.download = baseName + '-compressed' + ext;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

downloadAllBtn.addEventListener('click', function() {
  var done = images.filter(function(img) { return img.status === 'done'; });
  if (done.length === 0) return;

  if (done.length === 1) {
    downloadSingle(done[0]);
    return;
  }

  // Download each one individually with a small delay
  done.forEach(function(img, i) {
    setTimeout(function() { downloadSingle(img); }, i * 200);
  });
});

shareBtn.addEventListener('click', async function() {
  var done = images.filter(function(img) { return img.status === 'done'; });
  if (done.length === 0) return;
  var files = done.map(function(img) {
    var ext = getExtForMime(img.compBlob.type);
    var baseName = img.name.replace(/\.[^.]+$/, '');
    return new File([img.compBlob], baseName + '-compressed' + ext, { type: img.compBlob.type });
  });
  if (navigator.canShare && navigator.canShare({ files: files })) {
    try { await navigator.share({ files: files, title: 'Compressed Images' }); }
    catch (err) { if (err.name !== 'AbortError') done.forEach(function(img, i) { setTimeout(function() { downloadSingle(img); }, i * 200); }); }
  } else {
    done.forEach(function(img, i) { setTimeout(function() { downloadSingle(img); }, i * 200); });
  }
});

// === Load image dimensions on add (for display) ===
function loadImageDimensions(img) {
  var imgEl = new Image();
  imgEl.onload = function() {
    img.width = imgEl.naturalWidth;
    img.height = imgEl.naturalHeight;
    updateUI();
  };
  imgEl.src = img.origUrl;
}

// Patch addFiles to load dimensions
var _origAddFiles = addFiles;
addFiles = function(files) {
  var startLen = images.length;
  _origAddFiles(files);
  for (var i = startLen; i < images.length; i++) {
    loadImageDimensions(images[i]);
  }
};

// === Init ===
GameTheme.init();
updateUI();
</script>
