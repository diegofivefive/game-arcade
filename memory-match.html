<style>
  .game-page { padding-bottom: 32px; }
  .game-header { max-width: 560px; margin: 0 auto; }

  /* Controls */
  .controls {
    width: 100%;
    max-width: 560px;
    padding: 0 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }
  .stats-row {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* Board */
  .board-wrap {
    width: 100%;
    max-width: 560px;
    padding: 0 12px 20px;
  }
  .board {
    display: grid;
    gap: 8px;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Card */
  .card {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.4s ease;
    transform-style: preserve-3d;
  }
  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    inset: 0;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 2px solid var(--card-border);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card-back {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    font-size: 24px;
  }
  .card-back::after {
    content: '?';
    font-size: 28px;
    font-weight: 800;
    color: rgba(255,255,255,0.4);
  }
  .card-front {
    background: var(--card);
    transform: rotateY(180deg);
    font-size: var(--emoji-size, 42px);
    user-select: none;
  }
  .card.matched .card-face {
    border-color: var(--accent3);
    box-shadow: 0 0 12px rgba(0, 230, 184, 0.3);
  }
  .card.matched {
    cursor: default;
  }
  .card:not(.flipped):not(.matched):hover .card-back {
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* Shake animation for wrong match */
  .card.wrong .card-inner {
    animation: cardShake 0.4s ease;
  }
  @keyframes cardShake {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-6px); }
    75% { transform: rotateY(180deg) translateX(6px); }
  }

  /* New game button */
  .new-game-btn {
    border: none;
    border-radius: var(--radius-md);
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--card-border);
    transition: all 0.15s;
  }
  .new-game-btn:hover { background: var(--btn-hover); transform: translateY(-1px); }

  @media (max-width: 400px) {
    .board { gap: 6px; }
    .card-back::after { font-size: 22px; }
    .pill-selector { width: 100%; }
    .pill-btn { flex: 1; text-align: center; font-size: 11px; padding: 5px 6px; }
  }
</style>

<script src="theme.js"></script>
<script>
// ===========================
// CONFIG
// ===========================
const DIFFS = {
  easy:   { cols: 4, rows: 3, pairs: 6,  label: 'Easy (4x3)' },
  medium: { cols: 4, rows: 4, pairs: 8,  label: 'Medium (4x4)' },
  hard:   { cols: 6, rows: 4, pairs: 12, label: 'Hard (6x4)' },
};

// Emoji pool (enough for 12 pairs)
const EMOJIS = [
  '\u{1F431}','\u{1F436}','\u{1F98A}','\u{1F43B}','\u{1F42C}','\u{1F985}',
  '\u{1F40D}','\u{1F422}','\u{1F419}','\u{1F41D}','\u{1F98B}','\u{1F984}',
  '\u{1F409}','\u{1F433}','\u{1F427}','\u{1F98E}'
];

// ===========================
// STATE
// ===========================
let cfg, cards, flippedCards, matchedPairs, totalPairs;
let moves = 0;
let locked = false; // prevent clicks during flip check
let gameStarted = false;
let currentDiff = 'easy';
let timer, stats;

// ===========================
// INIT
// ===========================
function init(diff = currentDiff) {
  currentDiff = diff;
  cfg = DIFFS[diff];
  totalPairs = cfg.pairs;
  matchedPairs = 0;
  moves = 0;
  flippedCards = [];
  locked = false;
  gameStarted = false;

  if (timer) timer.stop();
  timer = new GameTimer('timer');
  timer.reset();
  stats = new GameStatsManager('memory-match_' + diff);

  document.getElementById('moves').textContent = '0';
  document.getElementById('pairs').textContent = `0/${totalPairs}`;

  buildBoard();
}

// ===========================
// BOARD
// ===========================
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  board.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;

  // Pick emojis and create pairs
  const shuffledEmojis = [...EMOJIS].sort(() => Math.random() - 0.5);
  const selected = shuffledEmojis.slice(0, totalPairs);
  cards = [...selected, ...selected].sort(() => Math.random() - 0.5);

  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.dataset.emoji = emoji;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"></div>
        <div class="card-face card-front">${emoji}</div>
      </div>
    `;
    card.addEventListener('click', () => handleCardClick(card));
    board.appendChild(card);
  });

  // Size emojis to ~50% of card width
  requestAnimationFrame(() => {
    const firstCard = board.querySelector('.card');
    if (firstCard) {
      const sz = Math.round(firstCard.offsetWidth * 0.5);
      board.style.setProperty('--emoji-size', sz + 'px');
    }
  });
}

// ===========================
// CARD CLICK
// ===========================
function handleCardClick(card) {
  if (locked) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

  // Start timer on first click
  if (!gameStarted) {
    gameStarted = true;
    timer.start();
    stats.addPlay();
  }

  // Flip card
  card.classList.add('flipped');
  flippedCards.push(card);

  if (flippedCards.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    checkMatch();
  }
}

// ===========================
// MATCH CHECK
// ===========================
function checkMatch() {
  const [a, b] = flippedCards;
  locked = true;

  if (a.dataset.emoji === b.dataset.emoji) {
    // Match!
    setTimeout(() => {
      a.classList.add('matched');
      b.classList.add('matched');
      matchedPairs++;
      document.getElementById('pairs').textContent = `${matchedPairs}/${totalPairs}`;
      flippedCards = [];
      locked = false;

      if (matchedPairs === totalPairs) {
        handleWin();
      }
    }, 300);
  } else {
    // No match — shake then flip back
    setTimeout(() => {
      a.classList.add('wrong');
      b.classList.add('wrong');
      setTimeout(() => {
        a.classList.remove('flipped', 'wrong');
        b.classList.remove('flipped', 'wrong');
        flippedCards = [];
        locked = false;
      }, 500);
    }, 600);
  }
}

// ===========================
// WIN
// ===========================
function handleWin() {
  timer.stop();
  stats.addWin();
  const isNewBest = stats.setBestTime(currentDiff, timer.time);

  setTimeout(() => {
    document.getElementById('winTime').textContent = timer.formatted;
    document.getElementById('winMoves').textContent = `${moves} moves \u2022 ${DIFFS[currentDiff].label}`;
    const best = stats.getBestTime(currentDiff);
    document.getElementById('bestBadge').innerHTML = isNewBest
      ? '<div class="best-badge">&#x1f3c6; New Best!</div>'
      : best !== null ? `<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Best: ${new GameTimer().format(best)}</div>` : '';
    document.getElementById('winStats').innerHTML = `
      <div class="stats-card"><div class="s-label">Played</div><div class="s-value">${stats.played}</div></div>
      <div class="stats-card"><div class="s-label">Won</div><div class="s-value">${stats.won}</div></div>
      <div class="stats-card"><div class="s-label">Win %</div><div class="s-value">${stats.winRate}%</div></div>
      <div class="stats-card"><div class="s-label">Streak</div><div class="s-value">${stats.streak}</div></div>
    `;
    Modal.show('winModal');
    Confetti.launch();
  }, 500);
}

// ===========================
// DIFFICULTY BUTTONS
// ===========================
document.querySelectorAll('.pill-btn[data-diff]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill-btn[data-diff]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    init(btn.dataset.diff);
  });
});

// ===========================
// NEW GAME / PLAY AGAIN
// ===========================
document.getElementById('newGameBtn').addEventListener('click', () => init(currentDiff));
document.getElementById('winPlayAgain').addEventListener('click', () => {
  Modal.hide('winModal');
  init(currentDiff);
});

// ===========================
// START
// ===========================
GameTheme.init();
Modal.bindOverlayClose();
init();

// Update emoji size on resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const board = document.getElementById('board');
    const firstCard = board.querySelector('.card');
    if (firstCard) {
      const sz = Math.round(firstCard.offsetWidth * 0.5);
      board.style.setProperty('--emoji-size', sz + 'px');
    }
  }, 150);
});
</script>
